<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BASE Wrestling - Practice Plan: Technique</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bk:#0a0a0a;--dk:#141414;--cd:#1a1a1a;--bd:#2a2a2a;--gr:#888;--lt:#ccc;--wh:#f0f0f0;--gd:#c8a84e;--gdd:#a08030;--gdg:rgba(200,168,78,0.15);--gn:#27ae60;--r:12px;--rl:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--bk);color:var(--wh);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--dk);position:relative;overflow:hidden}
.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.header-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gd)}
.header-sub{font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.prog{padding:16px 20px 0}.prog-labels{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-s{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;font-weight:600;color:var(--gr)}
.prog-s.a{color:var(--gd)}.prog-s.c{color:var(--gn)}
.prog-bar{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gd),var(--gdd));border-radius:2px;transition:width .6s}
.screen{display:none;flex-direction:column;min-height:calc(100vh - 58px)}
.screen.active{display:flex;animation:fsi .4s ease}
@keyframes fsi{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.announce{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;text-align:center}
.sec-num{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:4px;color:var(--gdd);margin-bottom:8px;text-transform:uppercase}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:5px;color:var(--wh);margin-bottom:12px;line-height:1}
.sec-desc{font-size:14px;color:var(--gr);margin-bottom:24px;line-height:1.5;max-width:300px}
.btn-p{width:100%;max-width:300px;padding:16px 32px;background:linear-gradient(135deg,var(--gd),var(--gdd));color:var(--bk);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;border:none;border-radius:var(--r);cursor:pointer;transition:all .3s}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,168,78,.3)}.btn-p.off{opacity:.4;pointer-events:none}
.btn-c{width:100%;padding:16px;background:linear-gradient(135deg,var(--gd),var(--gdd));color:var(--bk);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;border:none;border-radius:var(--r);cursor:pointer;transition:all .3s}
.btn-c:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,168,78,.3)}.btn-c.off{opacity:.4;pointer-events:none}
.btn-sec{width:100%;padding:14px;background:transparent;color:var(--gr);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:all .3s;margin-top:8px}
.btn-sec:hover{border-color:var(--gdd);color:var(--gd)}
.area{flex:1;padding:24px 20px;overflow-y:auto;padding-bottom:20px}
.c-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--gd);font-weight:600;margin-bottom:6px}
.c-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--wh);margin-bottom:6px}
.c-desc{font-size:13px;color:var(--gr);margin-bottom:20px;line-height:1.5}
.time-rem{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(200,168,78,.06);border:1px solid var(--gdd);border-radius:var(--r);margin-bottom:20px}
.time-rem-l{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gd);font-weight:600}
.time-rem-v{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--wh)}
.chip-l{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gr);font-weight:600;margin-bottom:10px}
.chips{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.chip{padding:13px 16px;border-radius:var(--r);border:2px solid var(--bd);background:var(--cd);color:var(--lt);font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;text-align:center}
.chip:hover{border-color:var(--gdd)}.chip.a{border-color:var(--gd);background:var(--gdg);color:var(--gd)}
.chips-h{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip-sm{padding:10px 14px;border-radius:var(--r);border:2px solid var(--bd);background:var(--cd);color:var(--lt);font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;text-align:center;flex:1;min-width:calc(50% - 4px)}
.chip-sm:hover{border-color:var(--gdd)}.chip-sm.a{border-color:var(--gd);background:var(--gdg);color:var(--gd)}
.nested{margin-top:12px;padding:14px;background:rgba(0,0,0,.25);border-radius:var(--r);animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ctrl{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;margin-bottom:12px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between}
.ctrl-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--wh)}
.pk{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pk-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--bd);background:var(--cd);color:var(--wh);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Barlow',sans-serif;font-weight:600}
.pk-btn:hover{border-color:var(--gd);background:var(--gdg)}
.pk-v{text-align:center;min-width:40px}
.pk-n{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--wh)}
.pk-u{font-size:9px;color:var(--gr);letter-spacing:1px}
.bar{padding:12px 20px 28px;border-top:1px solid var(--bd);background:var(--dk)}
.sum{flex:1;padding:24px 20px;overflow-y:auto}
.chk{width:70px;height:70px;border-radius:50%;background:rgba(39,174,96,.15);border:2px solid var(--gn);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;animation:si .4s ease}
@keyframes si{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.chk svg{width:32px;height:32px;fill:var(--gn)}
.s-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:8px}
.s-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.s-t{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gd)}
.s-tm{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--wh)}
.s-det{font-size:12px;color:var(--lt);line-height:1.4}
.s-tot{background:var(--gdg);border:1px solid var(--gdd);border-radius:var(--r);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;margin:14px 0}
.s-tot-l{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gd)}
.s-tot-v{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--wh)}
.nxt{text-align:center;padding:16px;opacity:.6}
.nxt .l{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gr);margin-bottom:4px}
.nxt .n{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gdd)}
.added-list{margin-bottom:16px}
.added-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--cd);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px}
.added-name{font-size:13px;color:var(--wh);font-weight:600}
.added-time{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gd);letter-spacing:1px}
.added-x{background:none;border:none;color:var(--gr);font-size:16px;cursor:pointer;padding:0 4px;margin-left:8px}
.added-x:hover{color:#e74c3c}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-brand">BASE</div>
    <div class="header-sub">Practice Plan</div>
  </div>
  <div id="sc"></div>
</div>
<script>
var SC=document.getElementById('sc'),CHK='<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>';
var numBlocks=3,totalTime=15,blocks=[],curBlock=0,curCat=null,curSub=null,curSide=null,curSpec=null;
var ATTACKS={'UPPER BODY ATTACKS':['Front Headlock','Get to the Back (Duck, Drag, Shuck, Throw By, Slide By, Arm Drag)','Double Unders'],'LEG ATTACKS':['Head Inside Single','Head Outside Single','Double Leg'],'TOP & BOTTOM ATTACKS':['Bottom — Escapes & Reversals','Top — Breakdowns to Upper Body Control','Top — Breakdowns to Legs In']};
var POSITIONS={'UPPER BODY':['Overhook','Underhook','Over-Under / Chest to Chest','2 on 1'],'HEAD INSIDE SINGLE':['High','Medium','Side','Extended'],'HEAD OUTSIDE SINGLE':['High','Medium','Crackdown','Extended'],'FAILED ATTACKS':['Front Headlock','Seat Belt / Whizzer','50/50 Position'],'TOP & BOTTOM':['Wrist Ride','Chicken Wing','Half Nelson','Armbar','Leg Riding — Base','Leg Riding — Flat','Tilts']};
var SIDE_CATS=['HEAD INSIDE SINGLE','HEAD OUTSIDE SINGLE','FAILED ATTACKS','TOP & BOTTOM'];
function fm(m){if(m%1===0)return m.toString();var w=Math.floor(m),s=(m-w)*60;if(w===0)return s+'s';return w+':'+(s<10?'0':'')+s}
function bTime(){return Math.floor(totalTime/numBlocks)}
function ren(h){SC.innerHTML=h;SC.querySelector('.screen').classList.add('active')}
function prg(done){return '<div class="prog"><div class="prog-labels"><span class="prog-s c">Warm-Up &#10003;</span><span class="prog-s c">Drill &#10003;</span><span class="prog-s c">Battle &#10003;</span><span class="prog-s '+(done?'c':'a')+'">Technique</span><span class="prog-s">Circuit</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+(done?80:70)+'%"></div></div></div>'}
function subP(){var h='<div style="display:flex;gap:4px;margin-top:12px;padding:0 20px">';for(var i=0;i<numBlocks;i++)h+='<div style="flex:1;height:3px;border-radius:2px;background:'+(i<curBlock?'var(--gn)':i===curBlock?'var(--gd)':'var(--bd)')+';transition:background .4s"></div>';return h+'</div>'}
function showIntro(){ren('<div class="screen">'+prg(false)+'<div class="announce"><div class="sec-num">Section 4 of 5</div><div class="sec-title">TECHNIQUE</div><div class="sec-desc">Pick how many technique blocks and fill each one with attacks or positional work.</div><button class="btn-p" onclick="showSetup()">SET UP TECHNIQUE</button></div></div>')}
function showSetup(){var bt=bTime();var h='<div class="screen">'+prg(false)+'<div class="area"><div class="c-label">Technique Setup</div><div class="c-title">HOW MANY BLOCKS?</div><div class="c-desc">Each block gets equal time. Standard is 15 minutes total.</div><div class="ctrl"><div class="ctrl-row"><div><div class="ctrl-name">BLOCKS</div></div><div class="pk"><button class="pk-btn" onclick="adjS(\'b\',-1)">&#8722;</button><div class="pk-v"><div class="pk-n" id="s-b">'+numBlocks+'</div><div class="pk-u">BLOCKS</div></div><button class="pk-btn" onclick="adjS(\'b\',1)">+</button></div></div><div class="ctrl-row"><div><div class="ctrl-name">TOTAL TIME</div></div><div class="pk"><button class="pk-btn" onclick="adjS(\'t\',-1)">&#8722;</button><div class="pk-v"><div class="pk-n" id="s-t">'+totalTime+'</div><div class="pk-u">MIN</div></div><button class="pk-btn" onclick="adjS(\'t\',1)">+</button></div></div></div><div style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:var(--gdg);border:1px solid var(--gdd);border-radius:var(--r);margin-top:12px"><div style="font-family:Bebas Neue,sans-serif;font-size:14px;letter-spacing:2px;color:var(--gd)">TIME PER BLOCK</div><div style="font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:2px;color:var(--wh)" id="s-pb">'+bt+' MIN</div></div></div><div class="bar"><button class="btn-c" onclick="startB()">START PICKING</button></div></div>';ren(h)}
function adjS(k,d){if(k==='b')numBlocks=Math.max(1,Math.min(5,numBlocks+d));else totalTime=Math.max(5,Math.min(30,totalTime+d));var be=document.getElementById('s-b');if(be)be.textContent=numBlocks;var te=document.getElementById('s-t');if(te)te.textContent=totalTime;var pe=document.getElementById('s-pb');if(pe)pe.textContent=bTime()+' MIN'}
function startB(){blocks=[];curBlock=0;showBT()}
function showBT(){var bt=bTime();var h='<div class="screen">'+prg(false)+subP()+'<div class="area"><div class="c-label">Block '+(curBlock+1)+' of '+numBlocks+' &#8212; '+bt+' min</div><div class="c-title">WHAT DO YOU WANT TO WORK ON?</div><div class="chips"><div class="chip" onclick="pickCat(\'attacks\')">Attacks</div><div class="chip" onclick="pickCat(\'positions\')">Positions</div></div></div></div>';ren(h)}
function pickCat(type){curCat=type;var cats=type==='attacks'?ATTACKS:POSITIONS,keys=Object.keys(cats);var h='<div class="screen">'+prg(false)+subP()+'<div class="area"><div class="c-label">Block '+(curBlock+1)+' &#8212; '+(type==='attacks'?'Attacks':'Positions')+'</div><div class="c-title">PICK A CATEGORY</div><div class="chips">';keys.forEach(function(k){h+='<div class="chip" onclick="pickSub(\''+k.replace(/'/g,"\\'")+'\')">'+k+'</div>'});h+='</div></div><div class="bar"><button class="btn-sec" onclick="showBT()">&#8592; BACK</button></div></div>';ren(h)}
function pickSub(sub){curSub=sub;curSide=null;if(curCat==='positions'&&SIDE_CATS.indexOf(sub)>=0){var h='<div class="screen">'+prg(false)+subP()+'<div class="area"><div class="c-label">Block '+(curBlock+1)+' &#8212; '+sub+'</div><div class="c-title">OFFENSE OR DEFENSE?</div><div class="chips"><div class="chip" onclick="pickSide(\'Offense\')">Offense</div><div class="chip" onclick="pickSide(\'Defense\')">Defense</div></div></div><div class="bar"><button class="btn-sec" onclick="pickCat(\''+curCat+'\')">&#8592; BACK</button></div></div>';ren(h)}else{var cats=curCat==='attacks'?ATTACKS:POSITIONS,specs=cats[sub];var h='<div class="screen">'+prg(false)+subP()+'<div class="area"><div class="c-label">Block '+(curBlock+1)+' &#8212; '+sub+'</div><div class="c-title">PICK TECHNIQUE</div><div class="chips">';specs.forEach(function(sp){h+='<div class="chip" onclick="pickSpec(\''+sp.replace(/'/g,"\\'")+'\')">'+sp+'</div>'});h+='</div></div><div class="bar"><button class="btn-sec" onclick="pickCat(\''+curCat+'\')">&#8592; BACK</button></div></div>';ren(h)}}
function pickSide(side){curSide=side;var specs=POSITIONS[curSub];var h='<div class="screen">'+prg(false)+subP()+'<div class="area"><div class="c-label">Block '+(curBlock+1)+' &#8212; '+curSub+' ('+side+')</div><div class="c-title">PICK LEVEL</div><div class="chips">';specs.forEach(function(sp){h+='<div class="chip" onclick="pickSpec(\''+sp.replace(/'/g,"\\'")+'\')">'+sp+'</div>'});h+='</div></div><div class="bar"><button class="btn-sec" onclick="pickSub(\''+curSub.replace(/'/g,"\\'")+'\')">&#8592; BACK</button></div></div>';ren(h)}
function pickSpec(spec){curSpec=spec;var label=curCat==='attacks'?'Attack':curSide?'Position ('+curSide+')':'Position';var name=curSide?spec+' — '+curSide:spec;blocks.push({name:name,detail:curSub+' — '+label,time:bTime()});curBlock++;if(curBlock>=numBlocks)showSum();else showBT()}
function showSum(){var cards='',total=0;blocks.forEach(function(b,i){total+=b.time;cards+='<div class="s-card"><div class="s-hdr"><div class="s-t">Block '+(i+1)+': '+b.name.toUpperCase()+'</div><div class="s-tm">'+b.time+' MIN</div></div><div class="s-det">'+b.detail+'</div></div>'});ren('<div class="screen">'+prg(true)+'<div class="sum"><div style="text-align:center;margin-top:14px;margin-bottom:6px"><div class="chk">'+CHK+'</div><div class="sec-num">TECHNIQUE SET</div></div>'+cards+'<div class="s-tot"><div class="s-tot-l">TOTAL TECHNIQUE TIME</div><div class="s-tot-v">'+fm(total)+' MIN</div></div><div class="nxt"><div class="l">Up Next</div><div class="n">CIRCUIT</div></div></div><div class="bar"><button class="btn-c" onclick="alert(\'Next section: Circuit — coming soon!\')">CONTINUE TO CIRCUIT &#8594;</button></div></div>')}
showIntro();
</script></body></html>
