<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BASE Wrestling — Practice Plan: Drill</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --base-black: #0a0a0a;
    --base-dark: #141414;
    --base-card: #1a1a1a;
    --base-border: #2a2a2a;
    --base-gray: #888;
    --base-light: #ccc;
    --base-white: #f0f0f0;
    --base-gold: #c8a84e;
    --base-gold-dim: #a08030;
    --base-gold-glow: rgba(200, 168, 78, 0.15);
    --base-green: #27ae60;
    --radius: 12px;
    --radius-lg: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--base-black);
    color: var(--base-white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app-container {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--base-dark);
    position: relative;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--base-border);
    z-index: 10;
  }

  .header-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--base-gold);
  }

  .header-sub {
    font-size: 11px;
    color: var(--base-gray);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
  }

  /* ── Progress Bar ── */
  .progress-container {
    padding: 16px 20px 0;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .progress-step {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    color: var(--base-gray);
    transition: color 0.4s ease;
  }

  .progress-step.active { color: var(--base-gold); }
  .progress-step.completed { color: var(--base-green); }

  .progress-bar {
    height: 3px;
    background: var(--base-border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--base-gold), var(--base-gold-dim));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── Sub-progress dots ── */
  .sub-progress {
    display: flex;
    gap: 6px;
    margin-top: 14px;
    padding: 0 20px;
  }

  .sub-dot {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--base-border);
    transition: background 0.4s ease;
  }

  .sub-dot.active { background: var(--base-gold); }
  .sub-dot.done { background: var(--base-green); }

  /* ── Screen System ── */
  .screen {
    display: none;
    flex-direction: column;
    min-height: calc(100vh - 58px);
  }

  .screen.active {
    display: flex;
    animation: fadeSlideIn 0.4s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ── Section Announce ── */
  .section-announce {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 30px;
    text-align: center;
  }

  .section-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--base-gold-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 5px;
    color: var(--base-white);
    margin-bottom: 12px;
    line-height: 1;
  }

  .section-desc {
    font-size: 14px;
    color: var(--base-gray);
    margin-bottom: 44px;
    line-height: 1.5;
    max-width: 300px;
  }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%;
    max-width: 300px;
    padding: 16px 32px;
    background: linear-gradient(135deg, var(--base-gold), var(--base-gold-dim));
    color: var(--base-black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(200, 168, 78, 0.3);
  }

  .btn-continue {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--base-gold), var(--base-gold-dim));
    color: var(--base-black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0.4;
    pointer-events: none;
  }

  .btn-continue.enabled {
    opacity: 1;
    pointer-events: all;
  }

  .btn-continue.enabled:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(200, 168, 78, 0.3);
  }

  .btn-skip {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--base-gray);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 3px;
    border: 1px solid var(--base-border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
  }

  .btn-skip:hover {
    border-color: var(--base-gray);
    color: var(--base-light);
  }

  /* ── Content Area ── */
  .content-area {
    flex: 1;
    padding: 24px 20px;
    overflow-y: auto;
    padding-bottom: 20px;
  }

  .content-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--base-gold);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .content-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--base-white);
    margin-bottom: 6px;
  }

  .content-desc {
    font-size: 13px;
    color: var(--base-gray);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  /* ── Picker Cards (category select screen) ── */
  .picker-card {
    background: var(--base-card);
    border: 2px solid var(--base-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  .picker-card:hover {
    border-color: var(--base-gold-dim);
  }

  .picker-card.selected {
    border-color: var(--base-gold);
    background: linear-gradient(135deg, rgba(200, 168, 78, 0.08), rgba(200, 168, 78, 0.02));
  }

  .picker-card.selected::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--base-gold);
    border-radius: 2px 0 0 2px;
  }

  .picker-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 19px;
    letter-spacing: 2px;
    color: var(--base-white);
  }

  .picker-check {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--base-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  .picker-card.selected .picker-check {
    border-color: var(--base-gold);
    background: var(--base-gold);
  }

  .picker-check svg {
    width: 14px;
    height: 14px;
    fill: var(--base-black);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .picker-card.selected .picker-check svg {
    opacity: 1;
  }

  /* ── Sub-option Chips ── */
  .chip-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--base-gray);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .chip-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .chip {
    padding: 14px 18px;
    border-radius: var(--radius);
    border: 2px solid var(--base-border);
    background: var(--base-card);
    color: var(--base-light);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }

  .chip:hover {
    border-color: var(--base-gold-dim);
  }

  .chip.active {
    border-color: var(--base-gold);
    background: var(--base-gold-glow);
    color: var(--base-gold);
  }

  /* ── Nested chips (smaller, horizontal) ── */
  .nested-section {
    margin-top: 16px;
    padding: 16px;
    background: rgba(0,0,0,0.25);
    border-radius: var(--radius);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .nested-chips {
    display: flex;
    gap: 10px;
  }

  .nested-chip {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius);
    border: 2px solid var(--base-border);
    background: var(--base-card);
    color: var(--base-light);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
  }

  .nested-chip:hover {
    border-color: var(--base-gold-dim);
  }

  .nested-chip.active {
    border-color: var(--base-gold);
    background: var(--base-gold-glow);
    color: var(--base-gold);
  }

  /* ── Top/Bottom toggle ── */
  .tb-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .tb-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: var(--radius);
    border: 2px solid var(--base-border);
    background: var(--base-card);
    color: var(--base-gray);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-align: center;
    transition: all 0.25s ease;
  }

  .tb-btn:hover { border-color: var(--base-gold-dim); }

  .tb-btn.active {
    border-color: var(--base-gold);
    background: var(--base-gold-glow);
    color: var(--base-gold);
  }

  /* ── Time Picker ── */
  .time-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 0;
    border-top: 1px solid var(--base-border);
    margin-top: 8px;
  }

  .time-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--base-gray);
    font-weight: 600;
  }

  .time-picker {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .time-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid var(--base-border);
    background: var(--base-card);
    color: var(--base-white);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
  }

  .time-btn:hover {
    border-color: var(--base-gold);
    background: var(--base-gold-glow);
  }

  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--base-white);
    min-width: 50px;
    text-align: center;
  }

  .time-unit {
    font-size: 10px;
    color: var(--base-gray);
    letter-spacing: 1px;
    text-align: center;
  }

  /* ── Action Bar ── */
  .action-bar {
    padding: 12px 20px 28px;
    border-top: 1px solid var(--base-border);
    background: var(--base-dark);
  }

  /* ── Summary ── */
  .summary-content {
    flex: 1;
    padding: 24px 20px;
    overflow-y: auto;
  }

  .checkmark-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(39, 174, 96, 0.15);
    border: 2px solid var(--base-green);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    animation: scaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes scaleIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .checkmark-circle svg {
    width: 36px;
    height: 36px;
    fill: var(--base-green);
  }

  .summary-card {
    background: var(--base-card);
    border: 1px solid var(--base-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 10px;
  }

  .summary-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .summary-card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--base-gold);
  }

  .summary-card-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--base-white);
  }

  .summary-detail {
    font-size: 13px;
    color: var(--base-light);
  }

  .summary-total {
    background: var(--base-gold-glow);
    border: 1px solid var(--base-gold-dim);
    border-radius: var(--radius);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 16px 0;
  }

  .summary-total-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--base-gold);
  }

  .summary-total-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--base-white);
  }

  .next-preview {
    text-align: center;
    padding: 20px;
    opacity: 0.6;
    margin-top: 10px;
  }

  .next-preview .lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--base-gray);
    margin-bottom: 4px;
  }

  .next-preview .nm {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--base-gold-dim);
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="header-brand">BASE</div>
    <div class="header-sub">Practice Plan</div>
  </div>

  <!-- All screens rendered here by JS -->
  <div id="screen-container"></div>
</div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const ALL_CATEGORIES = [
  {
    id: 'upper',
    name: 'UPPER BODY',
    label: 'Pick Technique',
    subs: ['Underhook', 'Overhook', 'Over-Under / Chest to Chest', '2 on 1'],
    type: 'standard'
  },
  {
    id: 'legattack',
    name: 'LEG ATTACK',
    label: 'Pick Attack',
    subs: ['Head Inside Single', 'Head Outside Single', 'Double Leg'],
    type: 'standard'
  },
  {
    id: 'legdefense',
    name: 'LEG ATTACK DEFENSE',
    label: 'Pick Defense',
    subs: ['Head Inside Single — High', 'Head Inside Single — Extended', 'Head Outside Single — High', 'Head Outside Single — Extended'],
    type: 'standard'
  },
  {
    id: 'failattack',
    name: 'FAIL ATTACK',
    label: 'Pick Position',
    subs: ['Front Headlock Offense', 'Front Headlock Defense', 'Seat Belt / Whizzer'],
    nested: { trigger: 'Seat Belt / Whizzer', label: 'Pick Side', options: ['Seat Belt', 'Whizzer'] },
    type: 'nested'
  },
  {
    id: 'topbottom',
    name: 'TOP & BOTTOM',
    type: 'topbottom',
    topSubs: ['Breakdowns', 'Breakdown to a Turn', 'Mat Returns'],
    bottomSubs: ['Escapes', 'Reversals']
  }
];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let selectedCategoryIds = [];
let categoryData = {};
let currentStepIndex = -1; // -1 = intro, 0 = picker, 1+ = individual categories
let flow = []; // ordered list of category ids to go through

// ══════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════
const container = document.getElementById('screen-container');

function render(screenHtml) {
  container.innerHTML = screenHtml;
  container.querySelector('.screen').classList.add('active');
}

function progressBar(drillActive = true) {
  return `
    <div class="progress-container">
      <div class="progress-labels">
        <span class="progress-step completed">Warm-Up ✓</span>
        <span class="progress-step ${drillActive ? 'active' : 'completed'}">Drill</span>
        <span class="progress-step">Battle</span>
        <span class="progress-step">Technique</span>
        <span class="progress-step">Circuit</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width: ${drillActive ? '30' : '40'}%"></div></div>
    </div>
  `;
}

function subDots() {
  if (flow.length === 0) return '';
  let dots = '<div class="sub-progress">';
  flow.forEach((catId, i) => {
    const stepIdx = i + 1;
    let cls = '';
    if (stepIdx < currentStepIndex) cls = 'done';
    else if (stepIdx === currentStepIndex) cls = 'active';
    dots += `<div class="sub-dot ${cls}"></div>`;
  });
  dots += '</div>';
  return dots;
}

// ══════════════════════════════════════
// SCREEN: Intro
// ══════════════════════════════════════
function showIntro() {
  currentStepIndex = -1;
  render(`
    <div class="screen">
      ${progressBar()}
      <div class="section-announce">
        <div class="section-number">Section 2 of 5</div>
        <div class="section-title">DRILL</div>
        <div class="section-desc">Scope-based drilling. Pick your focus areas and set the time for each.</div>
        <button class="btn-primary" onclick="showPicker()">SELECT DRILL AREAS</button>
      </div>
    </div>
  `);
}

// ══════════════════════════════════════
// SCREEN: Category Picker
// ══════════════════════════════════════
function showPicker() {
  currentStepIndex = 0;
  let cards = ALL_CATEGORIES.map(cat => {
    const sel = selectedCategoryIds.includes(cat.id) ? 'selected' : '';
    return `
      <div class="picker-card ${sel}" onclick="togglePick('${cat.id}', this)">
        <div class="picker-name">${cat.name}</div>
        <div class="picker-check">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        </div>
      </div>
    `;
  }).join('');

  render(`
    <div class="screen">
      ${progressBar()}
      <div class="content-area">
        <div class="content-label">Section 2</div>
        <div class="content-title">PICK YOUR DRILLS</div>
        <div class="content-desc">Select which areas you want to drill today. You'll set the details for each one next.</div>
        ${cards}
      </div>
      <div class="action-bar">
        <button class="btn-continue ${selectedCategoryIds.length > 0 ? 'enabled' : ''}" id="btn-picker-next" onclick="startFlow()">NEXT</button>
      </div>
    </div>
  `);
}

function togglePick(catId, el) {
  const idx = selectedCategoryIds.indexOf(catId);
  if (idx > -1) {
    selectedCategoryIds.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    selectedCategoryIds.push(catId);
    el.classList.add('selected');
  }
  const btn = document.getElementById('btn-picker-next');
  btn.classList.toggle('enabled', selectedCategoryIds.length > 0);
}

function startFlow() {
  if (selectedCategoryIds.length === 0) return;
  // Order flow by original order
  flow = ALL_CATEGORIES.filter(c => selectedCategoryIds.includes(c.id)).map(c => c.id);
  // Init data
  flow.forEach(id => {
    categoryData[id] = { sub: null, nested: null, time: 3, tbMode: null, topSub: null, bottomSub: null };
  });
  currentStepIndex = 1;
  showCategoryScreen(flow[0]);
}

// ══════════════════════════════════════
// SCREEN: Individual Category
// ══════════════════════════════════════
function showCategoryScreen(catId) {
  const cat = ALL_CATEGORIES.find(c => c.id === catId);
  const data = categoryData[catId];
  const stepNum = flow.indexOf(catId) + 1;
  const totalSteps = flow.length;
  currentStepIndex = stepNum;

  let bodyHtml = '';

  if (cat.type === 'standard') {
    bodyHtml = buildStandardBody(cat, catId);
  } else if (cat.type === 'nested') {
    bodyHtml = buildNestedBody(cat, catId);
  } else if (cat.type === 'topbottom') {
    bodyHtml = buildTopBottomBody(cat, catId);
  }

  render(`
    <div class="screen">
      ${progressBar()}
      ${subDots()}
      <div class="content-area">
        <div class="content-label">Drill ${stepNum} of ${totalSteps}</div>
        <div class="content-title">${cat.name}</div>
        ${bodyHtml}
        <div class="time-section">
          <div><div class="time-label">Duration</div></div>
          <div class="time-picker">
            <button class="time-btn" onclick="adjTime('${catId}', -1)">−</button>
            <div>
              <div class="time-display" id="time-${catId}">${data.time}</div>
              <div class="time-unit">MIN</div>
            </div>
            <button class="time-btn" onclick="adjTime('${catId}', 1)">+</button>
          </div>
        </div>
      </div>
      <div class="action-bar">
        <button class="btn-continue" id="btn-cat-next" onclick="nextCategory()">NEXT</button>
      </div>
    </div>
  `);

  validateCatNext(catId);
}

function buildStandardBody(cat, catId) {
  let chips = cat.subs.map(s => {
    const active = categoryData[catId].sub === s ? 'active' : '';
    return `<div class="chip ${active}" onclick="pickSub('${catId}', this, '${s.replace(/'/g, "\\'")}')">${s}</div>`;
  }).join('');

  return `
    <div class="chip-label">${cat.label}</div>
    <div class="chip-grid">${chips}</div>
  `;
}

function buildNestedBody(cat, catId) {
  let chips = cat.subs.map(s => {
    const active = categoryData[catId].sub === s ? 'active' : '';
    return `<div class="chip ${active}" onclick="pickNestedSub('${catId}', this, '${s.replace(/'/g, "\\'")}')">${s}</div>`;
  }).join('');

  const data = categoryData[catId];
  let nestedHtml = '';
  if (data.sub === cat.nested.trigger) {
    const nestedChips = cat.nested.options.map(o => {
      const active = data.nested === o ? 'active' : '';
      return `<div class="nested-chip ${active}" onclick="pickNestedOption('${catId}', this, '${o}')">${o}</div>`;
    }).join('');

    nestedHtml = `
      <div class="nested-section" id="nested-area-${catId}">
        <div class="chip-label">${cat.nested.label}</div>
        <div class="nested-chips">${nestedChips}</div>
      </div>
    `;
  }

  return `
    <div class="chip-label">${cat.label}</div>
    <div class="chip-grid" id="chips-${catId}">${chips}</div>
    <div id="nested-container-${catId}">${nestedHtml}</div>
  `;
}

function buildTopBottomBody(cat, catId) {
  const data = categoryData[catId];

  let topChips = '', bottomChips = '';
  const showTop = data.tbMode === 'top' || data.tbMode === 'half';
  const showBottom = data.tbMode === 'bottom' || data.tbMode === 'half';

  if (showTop) {
    topChips = `
      <div class="chip-label" style="margin-top:16px">Top Technique</div>
      <div class="chip-grid">
        ${cat.topSubs.map(s => {
          const active = data.topSub === s ? 'active' : '';
          return `<div class="chip ${active}" onclick="pickTBSub('${catId}', 'top', this, '${s}')">${s}</div>`;
        }).join('')}
      </div>
    `;
  }

  if (showBottom) {
    bottomChips = `
      <div class="chip-label" style="margin-top:16px">Bottom Technique</div>
      <div class="chip-grid">
        ${cat.bottomSubs.map(s => {
          const active = data.bottomSub === s ? 'active' : '';
          return `<div class="chip ${active}" onclick="pickTBSub('${catId}', 'bottom', this, '${s}')">${s}</div>`;
        }).join('')}
      </div>
    `;
  }

  return `
    <div class="chip-label">Split</div>
    <div class="tb-toggle">
      <div class="tb-btn ${data.tbMode === 'top' ? 'active' : ''}" onclick="pickTBMode('${catId}', 'top', this)">JUST TOP</div>
      <div class="tb-btn ${data.tbMode === 'bottom' ? 'active' : ''}" onclick="pickTBMode('${catId}', 'bottom', this)">JUST BOTTOM</div>
      <div class="tb-btn ${data.tbMode === 'half' ? 'active' : ''}" onclick="pickTBMode('${catId}', 'half', this)">HALF & HALF</div>
    </div>
    <div id="tb-subs-${catId}">
      ${topChips}
      ${bottomChips}
    </div>
  `;
}

// ══════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════
function pickSub(catId, el, val) {
  el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  categoryData[catId].sub = val;
  validateCatNext(catId);
}

function pickNestedSub(catId, el, val) {
  const cat = ALL_CATEGORIES.find(c => c.id === catId);
  el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  categoryData[catId].sub = val;
  categoryData[catId].nested = null;

  // Handle nested display
  const nestedContainer = document.getElementById('nested-container-' + catId);
  if (val === cat.nested.trigger) {
    const nestedChips = cat.nested.options.map(o => {
      return `<div class="nested-chip" onclick="pickNestedOption('${catId}', this, '${o}')">${o}</div>`;
    }).join('');
    nestedContainer.innerHTML = `
      <div class="nested-section">
        <div class="chip-label">${cat.nested.label}</div>
        <div class="nested-chips">${nestedChips}</div>
      </div>
    `;
  } else {
    nestedContainer.innerHTML = '';
  }

  validateCatNext(catId);
}

function pickNestedOption(catId, el, val) {
  el.parentElement.querySelectorAll('.nested-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  categoryData[catId].nested = val;
  validateCatNext(catId);
}

function pickTBMode(catId, mode, el) {
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  categoryData[catId].tbMode = mode;
  categoryData[catId].topSub = null;
  categoryData[catId].bottomSub = null;

  // Re-render the sub-options area
  const cat = ALL_CATEGORIES.find(c => c.id === catId);
  const subsContainer = document.getElementById('tb-subs-' + catId);
  const showTop = mode === 'top' || mode === 'half';
  const showBottom = mode === 'bottom' || mode === 'half';

  let html = '';
  if (showTop) {
    html += `
      <div class="chip-label" style="margin-top:16px">Top Technique</div>
      <div class="chip-grid">
        ${cat.topSubs.map(s => `<div class="chip" onclick="pickTBSub('${catId}', 'top', this, '${s}')">${s}</div>`).join('')}
      </div>
    `;
  }
  if (showBottom) {
    html += `
      <div class="chip-label" style="margin-top:16px">Bottom Technique</div>
      <div class="chip-grid">
        ${cat.bottomSubs.map(s => `<div class="chip" onclick="pickTBSub('${catId}', 'bottom', this, '${s}')">${s}</div>`).join('')}
      </div>
    `;
  }
  subsContainer.innerHTML = html;
  validateCatNext(catId);
}

function pickTBSub(catId, side, el, val) {
  // Only deselect siblings within same section
  el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (side === 'top') categoryData[catId].topSub = val;
  else categoryData[catId].bottomSub = val;
  validateCatNext(catId);
}

function adjTime(catId, delta) {
  const d = categoryData[catId];
  d.time = Math.max(2, Math.min(4, d.time + delta));
  document.getElementById('time-' + catId).textContent = d.time;
}

// ══════════════════════════════════════
// VALIDATION
// ══════════════════════════════════════
function validateCatNext(catId) {
  const btn = document.getElementById('btn-cat-next');
  if (!btn) return;
  const cat = ALL_CATEGORIES.find(c => c.id === catId);
  const data = categoryData[catId];
  let valid = false;

  if (cat.type === 'standard') {
    valid = !!data.sub;
  } else if (cat.type === 'nested') {
    if (data.sub && data.sub !== cat.nested.trigger) valid = true;
    else if (data.sub === cat.nested.trigger && data.nested) valid = true;
  } else if (cat.type === 'topbottom') {
    if (!data.tbMode) valid = false;
    else if (data.tbMode === 'top') valid = !!data.topSub;
    else if (data.tbMode === 'bottom') valid = !!data.bottomSub;
    else if (data.tbMode === 'half') valid = !!data.topSub && !!data.bottomSub;
  }

  btn.classList.toggle('enabled', valid);
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function nextCategory() {
  const btn = document.getElementById('btn-cat-next');
  if (!btn.classList.contains('enabled')) return;

  const currentIdx = currentStepIndex - 1; // 0-based index into flow
  if (currentIdx < flow.length - 1) {
    currentStepIndex++;
    showCategoryScreen(flow[currentIdx + 1]);
  } else {
    showSummary();
  }
}

// ══════════════════════════════════════
// SCREEN: Summary
// ══════════════════════════════════════
function showSummary() {
  currentStepIndex = flow.length + 1;

  const labels = {
    upper: 'UPPER BODY',
    legattack: 'LEG ATTACK',
    legdefense: 'LEG ATTACK DEFENSE',
    failattack: 'FAIL ATTACK',
    topbottom: 'TOP & BOTTOM'
  };

  let totalTime = 0;
  let cards = '';

  flow.forEach(catId => {
    const cat = ALL_CATEGORIES.find(c => c.id === catId);
    const data = categoryData[catId];
    totalTime += data.time;

    let detail = '';
    if (cat.type === 'standard') {
      detail = data.sub;
    } else if (cat.type === 'nested') {
      if (data.sub === cat.nested.trigger) {
        detail = data.nested;
      } else {
        detail = data.sub;
      }
    } else if (cat.type === 'topbottom') {
      const modeLabel = data.tbMode === 'top' ? 'Just Top' : data.tbMode === 'bottom' ? 'Just Bottom' : 'Half & Half';
      let parts = [modeLabel];
      if (data.topSub) parts.push('Top: ' + data.topSub);
      if (data.bottomSub) parts.push('Bottom: ' + data.bottomSub);
      detail = parts.join(' · ');
    }

    cards += `
      <div class="summary-card">
        <div class="summary-card-header">
          <div class="summary-card-title">${labels[catId]}</div>
          <div class="summary-card-time">${data.time} MIN</div>
        </div>
        <div class="summary-detail">${detail}</div>
      </div>
    `;
  });

  render(`
    <div class="screen">
      ${progressBar(false)}
      <div class="summary-content">
        <div style="text-align: center; margin-top: 16px; margin-bottom: 8px;">
          <div class="checkmark-circle">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
          </div>
          <div class="section-number">DRILL SET</div>
        </div>
        ${cards}
        <div class="summary-total">
          <div class="summary-total-label">TOTAL DRILL TIME</div>
          <div class="summary-total-value">${totalTime} MIN</div>
        </div>
        <div class="next-preview">
          <div class="lbl">Up Next</div>
          <div class="nm">BATTLE</div>
        </div>
      </div>
      <div class="action-bar">
        <button class="btn-continue enabled" onclick="alert('Next section: Battle — coming soon!')">CONTINUE TO BATTLE →</button>
      </div>
    </div>
  `);
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
showIntro();
</script>
