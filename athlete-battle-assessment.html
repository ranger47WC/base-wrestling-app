<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BASE Wrestling — Battle Assessment (Athlete)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bk:#0a0a0a;--dk:#141414;--cd:#1a1a1a;--bd:#2a2a2a;--gr:#888;--grd:#555;--lt:#ddd;--wh:#f0f0f0;--gd:#c8a84e;--gdd:#a08030;--gdg:rgba(200,168,78,.12);--gn:#27ae60;--gng:rgba(39,174,96,.12);--rd:#ff4d4d;--rdg:rgba(255,77,77,.12);--blu:#3b82f6;--blug:rgba(59,130,246,.12);--r:12px;--rl:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--bk);color:var(--wh);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--dk);display:flex;flex-direction:column;position:relative}
.hd{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);flex-shrink:0;z-index:10;background:var(--dk)}
.hd-left{display:flex;align-items:center;gap:12px}
.hd-back{width:36px;height:36px;border-radius:10px;border:1px solid var(--bd);background:var(--cd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--gr)}
.hd-info div:first-child{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gd)}
.hd-info div:last-child{font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.hd-save{font-size:12px;color:var(--gd);font-weight:600;cursor:pointer;padding:8px 12px;border:1px solid rgba(200,168,78,.3);border-radius:var(--r);background:var(--gdg)}
.progress-wrap{padding:12px 20px 8px;flex-shrink:0}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-size:11px;color:var(--gr);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.progress-count{font-size:11px;color:var(--gd);font-weight:700}
.progress-bar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gd);border-radius:2px;transition:width .3s ease}
.section-intro{padding:24px 20px 16px;text-align:center}
.section-icon{font-size:40px;margin-bottom:12px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gd);margin-bottom:8px}
.section-desc{font-size:13px;color:var(--gr);line-height:1.5;max-width:340px;margin:0 auto}
.q-area{flex:1;overflow-y:auto;padding:0 20px 120px}
.video-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);margin:0 0 16px;overflow:hidden}
.video-thumb{height:160px;background:var(--bk);display:flex;align-items:center;justify-content:center}
.video-play{width:50px;height:50px;border-radius:50%;background:rgba(200,168,78,.9);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--bk)}
.video-label{padding:10px 14px;font-size:12px;color:var(--gr);font-weight:600}
.q-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;margin-bottom:12px}
.q-num{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--grd);font-weight:700;margin-bottom:8px}
.q-text{font-size:15px;color:var(--wh);font-weight:600;line-height:1.4;margin-bottom:6px}
.q-hint{font-size:12px;color:var(--gr);line-height:1.4;margin-bottom:16px}
.q-buttons{display:flex;gap:8px}
.q-btn{flex:1;padding:14px 8px;border-radius:var(--r);border:2px solid var(--bd);background:var(--bk);cursor:pointer;text-align:center;transition:all .2s}
.q-btn-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--grd);transition:color .2s}
.q-btn.below.selected{border-color:var(--rd);background:var(--rdg)}
.q-btn.below.selected .q-btn-label{color:var(--rd)}
.q-btn.at.selected{border-color:var(--gd);background:var(--gdg)}
.q-btn.at.selected .q-btn-label{color:var(--gd)}
.q-btn.above.selected{border-color:var(--gn);background:var(--gng)}
.q-btn.above.selected .q-btn-label{color:var(--gn)}
.sub-header{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--gd);font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sub-header::after{content:'';flex:1;height:1px;background:var(--bd)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:16px 20px;background:linear-gradient(transparent,var(--dk) 20%);display:flex;gap:10px;z-index:20}
.btn-back{flex:0 0 auto;padding:14px 20px;border-radius:var(--r);border:1px solid var(--bd);background:var(--cd);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gr);cursor:pointer}
.btn-next{flex:1;padding:14px;border-radius:var(--r);border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;text-align:center;transition:all .2s}
.btn-next.ready{background:var(--gd);color:var(--bk)}
.btn-next.disabled{background:var(--bd);color:var(--grd);pointer-events:none}
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;flex:1}
.complete-icon{font-size:60px;margin-bottom:20px}
.complete-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--gd);margin-bottom:12px}
.complete-sub{font-size:14px;color:var(--gr);line-height:1.5;max-width:300px;margin-bottom:20px}
.result-row{display:flex;justify-content:space-around;width:100%;max-width:300px;margin-bottom:24px}
.result-box{text-align:center}
.result-num{font-family:'Bebas Neue',sans-serif;font-size:32px}
.result-num.below-c{color:var(--rd)}
.result-num.at-c{color:var(--gd)}
.result-num.above-c{color:var(--gn)}
.result-label{font-size:10px;color:var(--grd);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.complete-btn{padding:16px 40px;border-radius:var(--r);border:none;background:var(--gd);color:var(--bk);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// EXACT MIRROR OF COACH battle-assessment-intake-v3 — athlete language
var SECTIONS=[
{id:'mat',title:'Controlling the Mat',icon:'🤼',
 videoLabel:'VIDEO: Controlling the Mat Explained',
 desc:'Rate your stance, motion, and positioning — offense and defense on the feet, plus top and bottom.',
 questions:[
  {id:'q1',label:'Neutral on the Feet — Offense',hint:'Rate your stance, motion, body fakes, level changes, and handfighting. Goal: Get to attacks and keep opponent off balance.'},
  {id:'q2',label:'Neutral on the Feet — Defense',hint:'Rate your ability to stop or minimize opponent\'s attacks.'},
  {id:'q3',label:'Top Position',hint:'Rate your ability to ride opponent and keep them in bottom position.'},
  {id:'q4',label:'Bottom Position',hint:'Rate your ability to keep a strong base for escapes and reversals.'}
 ]},
{id:'attacks',title:'Controlling the Attacks',icon:'⚔️',
 videoLabel:'VIDEO: Attacks Explained',
 desc:'Rate your offensive and defensive attack abilities — upper body, legs, top, and bottom.',
 questions:[
  {id:'q5',label:'Upper Body Attacks on the Feet — Offense',subGroup:'On the Feet',hint:'Rate your ability to attack opponent\'s upper body (front headlock, 2-on-1, underhooks, path to back via ducks, drags, shucks).'},
  {id:'q6',label:'Upper Body Attacks on the Feet — Defense',subGroup:'On the Feet',hint:'Rate your ability to defend against upper body attacks.'},
  {id:'q7',label:'Leg Attacks on the Feet — Offense',subGroup:'On the Feet',hint:'Rate your ability to attack using leg attacks (head inside single, head outside single, double leg).'},
  {id:'q8',label:'Leg Attacks on the Feet — Defense',subGroup:'On the Feet',hint:'Rate your ability to defend against head inside single, head outside single, and double leg attacks.'},
  {id:'q9',label:'Top Attacks — Upper Body Control',subGroup:'On the Mat',hint:'Rate your ability to control from top using upper body rides (wrist control, arm bars, chicken wings, half nelsons).'},
  {id:'q10',label:'Top Attacks — Legs In',subGroup:'On the Mat',hint:'Rate your ability to control from top with legs in (leg riding).'},
  {id:'q11',label:'Bottom Attacks — Escapes',subGroup:'On the Mat',hint:'Rate your ability to escape from bottom and get back to your feet.'},
  {id:'q12',label:'Bottom Attacks — Reversals',subGroup:'On the Mat',hint:'Rate your ability to reverse your opponent and gain top control from bottom.'}
 ]},
{id:'sit-ub',title:'Upper Body Situations',icon:'💪',
 videoLabel:'VIDEO: Upper Body Positions Explained',
 desc:'Rate your comfort controlling each upper body position.',
 questions:[
  {id:'q13',label:'Underhook — Offense Control',hint:'Rate your ability to control the underhook position on offense.'},
  {id:'q14',label:'Overhook — Offense Control',hint:'Rate your ability to control the overhook position on offense.'},
  {id:'q15',label:'Over/Under — Offense Control',hint:'Rate your ability to control the over/under chest-to-chest position on offense.'},
  {id:'q16',label:'2-on-1 — Offense Control',subGroup:'2-on-1',hint:'Rate your ability to control the 2-on-1 position on offense and create angles.'},
  {id:'q17',label:'2-on-1 — Defense Control',subGroup:'2-on-1',hint:'Rate your ability to defend when opponent has 2-on-1 control on you.'}
 ]},
{id:'sit-leg',title:'Leg Attack Situations',icon:'🦵',
 videoLabel:'VIDEO: Leg Attack Positions Explained',
 desc:'Rate your comfort controlling leg attack positions — offense and defense.',
 questions:[
  {id:'q18',label:'Head Inside Single — Offense Control',subGroup:'Head Inside Single',hint:'Rate your ability to control the head inside single position on offense.'},
  {id:'q19',label:'Head Inside Single — Defense Control',subGroup:'Head Inside Single',hint:'Rate your ability to defend and control when opponent has a head inside single on you.'},
  {id:'q20',label:'Head Outside Single — Offense Control',subGroup:'Head Outside Single',hint:'Rate your ability to control the head outside single position on offense.'},
  {id:'q21',label:'Head Outside Single — Defense Control',subGroup:'Head Outside Single',hint:'Rate your ability to defend and control when opponent has a head outside single on you.'}
 ]},
{id:'sit-fa',title:'Failed Attack Situations',icon:'🔄',
 videoLabel:'VIDEO: Failed Attack Positions Explained',
 desc:'Rate your comfort in positions that result from failed attacks.',
 questions:[
  {id:'q22',label:'Front Headlock — Offense Control',subGroup:'Front Headlock',hint:'Rate your ability to control the front headlock position on offense.'},
  {id:'q23',label:'Front Headlock — Defense Control',subGroup:'Front Headlock',hint:'Rate your ability to defend and escape when opponent has you in a front headlock.'},
  {id:'q24',label:'Seatbelt — Offense Control',subGroup:'Seatbelt / Whizzer',hint:'Rate your ability to control the seatbelt position on offense.'},
  {id:'q25',label:'Whizzer — Offense Control',subGroup:'Seatbelt / Whizzer',hint:'Rate your ability to control with the whizzer on offense.'}
 ]},
{id:'sit-tb',title:'Top / Bottom Situations',icon:'🔒',
 videoLabel:'VIDEO: Top/Bottom Positions Explained',
 desc:'Rate your comfort in top and bottom mat positions — offense and defense control.',
 questions:[
  {id:'q26',label:'Wrist Rides — Offense Control',subGroup:'Wrist Rides',hint:'Rate your ability to control with wrist rides from top position.'},
  {id:'q27',label:'Wrist Rides — Defense Control',subGroup:'Wrist Rides',hint:'Rate your ability to defend and escape when opponent has wrist ride control.'},
  {id:'q28',label:'Arm Bars — Offense Control',subGroup:'Arm Bars',hint:'Rate your ability to control with arm bars from top position.'},
  {id:'q29',label:'Arm Bars — Defense Control',subGroup:'Arm Bars',hint:'Rate your ability to defend and escape when opponent has arm bar control.'},
  {id:'q30',label:'Chicken Wing — Offense Control',subGroup:'Chicken Wing',hint:'Rate your ability to control with a chicken wing from top position.'},
  {id:'q31',label:'Chicken Wing — Defense Control',subGroup:'Chicken Wing',hint:'Rate your ability to defend and escape when opponent has chicken wing control.'},
  {id:'q32',label:'Leg Riding — Offense Control',subGroup:'Leg Riding',hint:'Rate your ability to control with legs in from top position.'},
  {id:'q33',label:'Leg Riding — Defense Control',subGroup:'Leg Riding',hint:'Rate your ability to defend and escape when opponent has legs in.'}
 ]}
];

var answers={};var curSec=0;var totalQ=33;
function answeredCount(){var c=0;for(var k in answers)if(answers[k])c++;return c;}
function sectionComplete(idx){var s=SECTIONS[idx];for(var i=0;i<s.questions.length;i++){if(!answers[s.questions[i].id])return false;}return true;}

function render(){
 if(curSec>=SECTIONS.length){renderComplete();return;}
 var s=SECTIONS[curSec];var globalAns=answeredCount();var pct=Math.round((globalAns/totalQ)*100);
 var h='<div class="hd"><div class="hd-left"><div class="hd-back" onclick="prevSec()">←</div>';
 h+='<div class="hd-info"><div>BATTLE ASSESSMENT</div><div>'+s.title+'</div></div></div>';
 h+='<div class="hd-save" onclick="alert(\'Progress saved\')">SAVE</div></div>';
 h+='<div class="progress-wrap"><div class="progress-top"><div class="progress-label">Section '+(curSec+1)+' of '+SECTIONS.length+'</div>';
 h+='<div class="progress-count">'+globalAns+'/'+totalQ+'</div></div>';
 h+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
 h+='<div class="section-intro"><div class="section-icon">'+s.icon+'</div>';
 h+='<div class="section-title">'+s.title.toUpperCase()+'</div>';
 h+='<div class="section-desc">'+s.desc+'</div></div>';
 h+='<div class="q-area">';
 h+='<div class="video-card"><div class="video-thumb"><div class="video-play">▶</div></div>';
 h+='<div class="video-label">📹 '+s.videoLabel+'</div></div>';
 var lastSub='';
 s.questions.forEach(function(q,i){
  if(q.subGroup&&q.subGroup!==lastSub){h+='<div class="sub-header">'+q.subGroup+'</div>';lastSub=q.subGroup;}
  var a=answers[q.id]||'';
  h+='<div class="q-card"><div class="q-num">Question '+(i+1)+'</div>';
  h+='<div class="q-text">'+q.label+'</div><div class="q-hint">'+q.hint+'</div>';
  h+='<div class="q-buttons">';
  h+='<div class="q-btn below'+(a==='below'?' selected':'')+'" onclick="pick(\''+q.id+'\',\'below\')"><div class="q-btn-label">BELOW</div></div>';
  h+='<div class="q-btn at'+(a==='at'?' selected':'')+'" onclick="pick(\''+q.id+'\',\'at\')"><div class="q-btn-label">AT</div></div>';
  h+='<div class="q-btn above'+(a==='above'?' selected':'')+'" onclick="pick(\''+q.id+'\',\'above\')"><div class="q-btn-label">ABOVE</div></div>';
  h+='</div></div>';
 });
 h+='</div>';
 var done=sectionComplete(curSec);var label=curSec===SECTIONS.length-1?'FINISH':'NEXT SECTION';
 h+='<div class="bottom-nav">';
 if(curSec>0)h+='<div class="btn-back" onclick="prevSec()">← BACK</div>';
 h+='<div class="btn-next '+(done?'ready':'disabled')+'" onclick="nextSec()">'+label+'</div></div>';
 document.getElementById('app').innerHTML=h;
}

function pick(qid,val){answers[qid]=val;render();}
function nextSec(){if(!sectionComplete(curSec))return;curSec++;render();window.scrollTo(0,0);}
function prevSec(){if(curSec>0){curSec--;render();window.scrollTo(0,0);}}

function renderComplete(){
 var b=0,a=0,ab=0;
 Object.values(answers).forEach(function(v){if(v==='below')b++;if(v==='at')a++;if(v==='above')ab++;});
 var h='<div class="hd"><div class="hd-left"><div class="hd-back" onclick="curSec=SECTIONS.length-1;render()">←</div>';
 h+='<div class="hd-info"><div>BATTLE ASSESSMENT</div><div>Complete</div></div></div></div>';
 h+='<div class="complete-screen"><div class="complete-icon">🏆</div>';
 h+='<div class="complete-title">ASSESSMENT COMPLETE</div>';
 h+='<div class="complete-sub">Here\'s how you rated yourself across '+totalQ+' battle positions. Your coach will see this and use it to personalize your training.</div>';
 h+='<div class="result-row">';
 h+='<div class="result-box"><div class="result-num below-c">'+b+'</div><div class="result-label">Below</div></div>';
 h+='<div class="result-box"><div class="result-num at-c">'+a+'</div><div class="result-label">At Rank</div></div>';
 h+='<div class="result-box"><div class="result-num above-c">'+ab+'</div><div class="result-label">Above</div></div>';
 h+='</div><div class="complete-btn" onclick="alert(\'→ Back to Dashboard\')">GO TO DASHBOARD</div></div>';
 document.getElementById('app').innerHTML=h;
}
render();
</script>
</body>
</html>
