<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BASE Wrestling — Team Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bk:#0a0a0a;--dk:#141414;--cd:#1a1a1a;--bd:#2a2a2a;--gr:#555;--lt:#ccc;--wh:#f0f0f0;--ph:#3a3a3a;--gd:#c8a84e;--gdd:#a08030;--gdg:rgba(200,168,78,.12);--gdg2:rgba(200,168,78,.06);--gn:#27ae60;--gng:rgba(39,174,96,.12);--rd:#c8102e;--rdg:rgba(200,16,46,.12);--blu:#3b82f6;--blug:rgba(59,130,246,.12);--org:#e67e22;--orgg:rgba(230,126,34,.12);--pur:#9b59b6;--purg:rgba(155,89,182,.12);--r:12px;--rl:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--bk);color:var(--wh);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--dk);display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ── HEADER ── */
.hd{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);flex-shrink:0;z-index:10;background:var(--dk)}
.hd-left{display:flex;align-items:center;gap:12px}
.hd-back{width:36px;height:36px;border-radius:10px;border:1px solid var(--bd);background:var(--cd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:16px;color:var(--gr)}
.hd-back:hover{border-color:var(--gd);color:var(--gd)}
.hd-info div:first-child{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gd)}
.hd-info div:last-child{font-size:10px;color:var(--gr);text-transform:uppercase;letter-spacing:2px;font-weight:600}

/* ── BOYS/GIRLS TOGGLE ── */
.roster-toggle{display:flex;margin:12px 20px 0;background:var(--cd);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden}
.rt-btn{flex:1;padding:10px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gr);cursor:pointer;transition:all .2s;border:none;background:transparent}
.rt-btn.active{background:var(--gdg);color:var(--gd);box-shadow:inset 0 -2px 0 var(--gd)}
.rt-btn:hover:not(.active){color:var(--lt)}

/* ── TEAM SUMMARY BAR ── */
.team-bar{padding:12px 20px;display:flex;gap:8px;flex-shrink:0}
.tb-stat{flex:1;text-align:center;padding:8px 4px;background:var(--cd);border-radius:var(--r);border:1px solid var(--bd)}
.tb-num{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--gd)}
.tb-label{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gr);font-weight:600;margin-top:2px}

/* ── SCROLLABLE BODY ── */
.stats-body{flex:1;overflow-y:auto;padding:0 20px 20px}

/* ── SECTION LABELS ── */
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gd);font-weight:600;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── STAT CARDS ── */
.stat-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:10px;transition:all .2s}

.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sc-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--wh)}

/* ── RECORD BY CLASS ── */
.class-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(42,42,42,.5)}
.class-row:last-child{border-bottom:none}
.cr-label{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gdd);width:40px;flex-shrink:0}
.cr-bar{flex:1;height:20px;border-radius:4px;overflow:hidden;display:flex;background:var(--bd)}
.cr-bar-w{background:var(--gn);height:100%;transition:width .6s ease;display:flex;align-items:center;justify-content:center}
.cr-bar-l{background:var(--rd);height:100%;transition:width .6s ease;display:flex;align-items:center;justify-content:center}
.cr-bar-w span,.cr-bar-l span{font-size:9px;font-weight:700;color:var(--wh);letter-spacing:.5px}
.cr-record{font-size:12px;font-weight:600;color:var(--lt);width:60px;text-align:right;flex-shrink:0}

/* ── TOP PERFORMERS ── */
.perf-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(42,42,42,.5)}
.perf-row:last-child{border-bottom:none}
.perf-rank{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gdd);width:24px;flex-shrink:0;text-align:center}
.perf-info{flex:1;min-width:0}
.perf-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;color:var(--wh);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.perf-detail{font-size:10px;color:var(--gr);margin-top:1px}
.perf-stars{display:flex;gap:1px;margin-top:2px}
.perf-stars .s{font-size:10px}
.perf-stars .s.on{color:var(--gd)}
.perf-stars .s.off{color:var(--bd)}
.perf-record{flex-shrink:0;text-align:right}
.perf-wl{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
.perf-wl .w{color:var(--gn)}
.perf-wl .d{color:var(--gr)}
.perf-wl .l{color:var(--rd)}

/* ── HORIZONTAL BARS (shared) ── */
.h-bar{margin-bottom:10px}
.h-bar:last-child{margin-bottom:0}
.h-bar-label{display:flex;justify-content:space-between;margin-bottom:5px}
.h-bar-name{font-size:11px;color:var(--lt);font-weight:500}
.h-bar-val{font-size:11px;font-weight:700}
.h-bar-val.good{color:var(--gn)}
.h-bar-val.ok{color:var(--gd)}
.h-bar-val.weak{color:var(--rd)}
.h-bar-track{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.h-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.h-bar-fill.good{background:var(--gn)}
.h-bar-fill.ok{background:var(--gd)}
.h-bar-fill.weak{background:var(--rd)}

/* ── BATTLE SITUATION BARS ── */
.sit-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(42,42,42,.5)}
.sit-row:last-child{border-bottom:none}
.sit-name{font-size:11px;color:var(--lt);width:90px;flex-shrink:0;font-weight:500}
.sit-bar{flex:1;height:20px;border-radius:4px;overflow:hidden;position:relative;background:var(--bd)}
.sit-fill{height:100%;border-radius:4px;transition:width .8s ease;display:flex;align-items:center;padding-left:8px}
.sit-fill.good{background:rgba(39,174,96,.3);border:1px solid rgba(39,174,96,.4)}
.sit-fill.ok{background:rgba(200,168,78,.2);border:1px solid rgba(200,168,78,.3)}
.sit-fill.weak{background:rgba(200,16,46,.2);border:1px solid rgba(200,16,46,.3)}
.sit-pct{font-size:10px;font-weight:700;color:var(--wh)}
.sit-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;width:70px;text-align:right}
.sit-tag.good{color:var(--gn)}
.sit-tag.ok{color:var(--gd)}
.sit-tag.weak{color:var(--rd)}

/* ── ATHLETIC TIER ROWS ── */
.tier-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,42,42,.5)}
.tier-row:last-child{border-bottom:none}
.tr-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 6px;border-radius:6px;width:100px;text-align:center;flex-shrink:0;line-height:1.2}
.tr-badge.elite{background:var(--purg);color:var(--pur)}
.tr-badge.super{background:var(--gng);color:var(--gn)}
.tr-badge.solid{background:var(--blug);color:var(--blu)}
.tr-badge.working{background:var(--orgg);color:var(--org)}
.tr-desc{font-size:9px;color:var(--gr);margin-top:2px}
.tr-bar{flex:1;height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.tr-fill{height:100%;border-radius:3px;transition:width .6s ease}
.tr-fill.elite{background:var(--pur)}
.tr-fill.super{background:var(--gn)}
.tr-fill.solid{background:var(--blu)}
.tr-fill.working{background:var(--org)}
.tr-count{font-size:12px;font-weight:600;color:var(--lt);width:24px;text-align:right;flex-shrink:0}

/* ── ACTIVITY ── */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-box{background:var(--dk);border:1px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center}
.act-icon{font-size:18px;margin-bottom:4px}
.act-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gd);letter-spacing:1px}
.act-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gr);font-weight:600;margin-top:2px}
.act-sub{font-size:10px;color:var(--gr);margin-top:4px}

/* ── ASSESSMENT COMPLETION (bottom) ── */
.assess-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ag-card{background:var(--dk);border:1px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center}
.ag-icon{font-size:20px;margin-bottom:6px}
.ag-name{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gr);font-weight:600;margin-bottom:4px}
.ag-pct{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px}
.ag-count{font-size:10px;color:var(--gr);margin-top:2px}

/* ── TOAST ── */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--cd);border:1px solid var(--gdd);color:var(--gd);padding:10px 20px;border-radius:var(--r);font-size:12px;font-weight:600;letter-spacing:1px;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<div class="app">

  <!-- ═══ HEADER ═══ -->
  <div class="hd">
    <div class="hd-left">
      <div class="hd-back" onclick="toast('Back to Dashboard')">←</div>
      <div class="hd-info">
        <div>TEAM STATS</div>
        <div>2025-26 Season</div>
      </div>
    </div>
  </div>

  <!-- ═══ BOYS / GIRLS TOGGLE ═══ -->
  <div class="roster-toggle">
    <div class="rt-btn active" id="rt-boys" onclick="switchRoster('boys')">BOYS</div>
    <div class="rt-btn" id="rt-girls" onclick="switchRoster('girls')">GIRLS</div>
  </div>

  <!-- ═══ TEAM SUMMARY BAR ═══ -->
  <div class="team-bar">
    <div class="tb-stat"><div class="tb-num" id="tb-size">—</div><div class="tb-label">Wrestlers</div></div>
    <div class="tb-stat"><div class="tb-num" id="tb-wins">—</div><div class="tb-label">Wins</div></div>
    <div class="tb-stat"><div class="tb-num" id="tb-losses">—</div><div class="tb-label">Losses</div></div>
    <div class="tb-stat"><div class="tb-num" id="tb-pct">—</div><div class="tb-label">Win %</div></div>
  </div>

  <!-- ═══ SCROLLABLE STATS BODY ═══ -->
  <div class="stats-body" id="stats-body"></div>

</div>

<div class="toast" id="toast-el"></div>

<script>
function toast(msg){
  var t=document.getElementById('toast-el');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},1800);
}

function makeStars(n,max){
  var h='';for(var i=1;i<=max;i++)h+='<span class="s '+(i<=n?'on':'off')+'">★</span>';return h;
}

var currentRoster='boys';
var activeRoster=roster;

function switchRoster(which){
  currentRoster=which;
  activeRoster=(which==='boys')?roster:girlsRoster;
  document.getElementById('rt-boys').classList.toggle('active',which==='boys');
  document.getElementById('rt-girls').classList.toggle('active',which==='girls');
  buildStats();
}

// ── ATHLETIC TIER CALCULATION ──
// 10 standard skills (indices 0-9), 4 bonus (indices 10-13)
function getAthTier(results){
  if(!results)return'none';
  var std=0;for(var i=0;i<10;i++)std+=results[i];
  var bonus=0;for(var i=10;i<14;i++)bonus+=results[i];
  if(std===10&&bonus>=1)return'elite';
  if(std===10)return'super';
  if(std>=8)return'solid';  // 75% of 10 = 7.5, round up to 8
  return'working';
}

// ══════════════════════════════════════════
// BUILD ALL STATS
// ══════════════════════════════════════════
function buildStats(){
  var r=activeRoster;
  var totalW=0,totalL=0;
  r.forEach(function(a){totalW+=a.w;totalL+=a.l;});
  var total=totalW+totalL;
  var pct=total>0?Math.round((totalW/total)*100):0;

  document.getElementById('tb-size').textContent=r.length;
  document.getElementById('tb-wins').textContent=totalW;
  document.getElementById('tb-losses').textContent=totalL;
  document.getElementById('tb-pct').textContent=pct+'%';

  var h='';
  var n=r.length;

  // ══════════════════════════════════════
  // 1. RECORD BY CLASS
  // ══════════════════════════════════════
  h+='<div class="sec-label">Record by Class</div>';
  h+='<div class="stat-card">';
  var classes=['Sr','Jr','So','Fr'];
  classes.forEach(function(cls){
    var cw=0,cl=0,count=0;
    r.forEach(function(a){if(a.yr===cls){cw+=a.w;cl+=a.l;count++;}});
    if(count===0)return;
    var ct=cw+cl;var cwPct=ct>0?Math.round((cw/ct)*100):0;
    var clPct=100-cwPct;
    h+='<div class="class-row">';
    h+='<div class="cr-label">'+cls.toUpperCase()+'</div>';
    h+='<div class="cr-bar">';
    if(cwPct>0)h+='<div class="cr-bar-w" style="width:'+cwPct+'%"><span>'+cw+'</span></div>';
    if(clPct>0)h+='<div class="cr-bar-l" style="width:'+clPct+'%"><span>'+cl+'</span></div>';
    h+='</div>';
    h+='<div class="cr-record">'+cw+' - '+cl+'</div>';
    h+='</div>';
  });
  h+='</div>';

  // ══════════════════════════════════════
  // 2. TOP PERFORMERS (record, star rank, weight)
  // ══════════════════════════════════════
  h+='<div class="sec-label">Top Performers</div>';
  h+='<div class="stat-card">';
  var sorted=r.slice().filter(function(a){return(a.w+a.l)>=5;}).sort(function(a,b){
    var aPct=a.w/(a.w+a.l);var bPct=b.w/(b.w+b.l);
    if(bPct!==aPct)return bPct-aPct;return b.w-a.w;
  });
  var top5=sorted.slice(0,5);
  top5.forEach(function(a,i){
    h+='<div class="perf-row">';
    h+='<div class="perf-rank">'+(i+1)+'</div>';
    h+='<div class="perf-info">';
    h+='<div class="perf-name">'+a.name.toUpperCase()+'</div>';
    h+='<div class="perf-detail">'+a.yr+' · '+a.wt+' lbs</div>';
    h+='<div class="perf-stars">'+makeStars(a.star,5)+'</div>';
    h+='</div>';
    h+='<div class="perf-record"><div class="perf-wl"><span class="w">'+a.w+'</span><span class="d"> - </span><span class="l">'+a.l+'</span></div></div>';
    h+='</div>';
  });
  h+='</div>';

  // ══════════════════════════════════════
  // 3. AREAS TO TARGET IN PRACTICE
  // ══════════════════════════════════════
  var battleWrestlers=r.filter(function(a){return a.battle&&a.battle.done;});
  if(battleWrestlers.length>0){
    h+='<div class="sec-label">Areas to Target in Practice</div>';
    h+='<div class="stat-card">';

    var sitAvgs=[];
    var sitKeys={ub:'Upper Body',hi:'Head Inside',ho:'Head Outside',fa:'Failed Attacks',tb:'Top / Bottom'};
    for(var sk in sitKeys){
      var s=0;battleWrestlers.forEach(function(a){s+=a.battle.situations[sk];});
      sitAvgs.push({key:sk,name:sitKeys[sk],avg:Math.round(s/battleWrestlers.length)});
    }
    sitAvgs.sort(function(a,b){return a.avg-b.avg;});

    h+='<div style="font-size:11px;color:var(--gr);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Weakest Situations</div>';
    var bottom2=sitAvgs.slice(0,2);
    bottom2.forEach(function(s){
      var cls=s.avg>=70?'good':s.avg>=50?'ok':'weak';
      h+='<div class="h-bar"><div class="h-bar-label"><div class="h-bar-name">'+s.name+'</div><div class="h-bar-val '+cls+'">'+s.avg+'% avg</div></div><div class="h-bar-track"><div class="h-bar-fill '+cls+'" style="width:'+s.avg+'%"></div></div></div>';
    });

    var atkBelow=[];
    var atkKeys={uo:'Upper Body Offense',lo:'Leg Attack Offense',ud:'Upper Body Defense',ld:'Leg Attack Defense',to:'Top Attacks',bo:'Bottom Attacks'};
    for(var akey in atkKeys){
      var bCount=0;
      battleWrestlers.forEach(function(a){if(a.battle.attacks[akey]==='Below')bCount++;});
      atkBelow.push({key:akey,name:atkKeys[akey],count:bCount,pct:Math.round(bCount/battleWrestlers.length*100)});
    }
    atkBelow.sort(function(a,b){return b.count-a.count;});

    if(atkBelow[0].count>0){
      h+='<div style="font-size:11px;color:var(--gr);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">Most "Below" Self-Ratings</div>';
      var topBelow=atkBelow.filter(function(a){return a.count>0;}).slice(0,3);
      topBelow.forEach(function(a){
        h+='<div class="h-bar"><div class="h-bar-label"><div class="h-bar-name">'+a.name+'</div><div class="h-bar-val weak">'+a.count+' wrestlers ('+a.pct+'%)</div></div><div class="h-bar-track"><div class="h-bar-fill weak" style="width:'+a.pct+'%"></div></div></div>';
      });
    }
    h+='</div>';
  }

  // ══════════════════════════════════════
  // 4. BATTLE ASSESSMENT · ATTACK TEAM AVG
  // ══════════════════════════════════════
  if(battleWrestlers.length>0){
    h+='<div class="sec-label">Battle Assessment · Attack Team Avg</div>';
    h+='<div class="stat-card">';
    var atkLabels={uo:'Upper Body Off',lo:'Leg Attacks Off',ud:'Upper Body Def',ld:'Leg Attacks Def',to:'Top Attacks',bo:'Bottom Attacks'};
    for(var ak in atkLabels){
      var below=0,at=0,above=0;
      battleWrestlers.forEach(function(a){
        var v=a.battle.attacks[ak];
        if(v==='Below')below++;else if(v==='At')at++;else above++;
      });
      var bn=battleWrestlers.length;
      var weighted=Math.round((at*50+above*100)/bn);
      var cls=weighted>=70?'good':weighted>=50?'ok':'weak';
      var tag=weighted>=70?'Strong':weighted>=50?'Developing':'Needs Work';
      h+='<div class="sit-row">';
      h+='<div class="sit-name">'+atkLabels[ak]+'</div>';
      h+='<div class="sit-bar"><div class="sit-fill '+cls+'" style="width:'+weighted+'%"><span class="sit-pct">'+weighted+'%</span></div></div>';

    h+='<div style="font-size:10px;color:var(--gr);margin-top:8px;text-align:right">Based on '+battleWrestlers.length+' wrestlers</div>';

    // ══════════════════════════════════════
    // 5. BATTLE ASSESSMENT · SITUATION TEAM AVG
    // ══════════════════════════════════════
    h+='<div class="sec-label">Battle Assessment · Situation Team Avg</div>';
    h+='<div class="stat-card">';
    var sits={ub:'Upper Body',hi:'Head Inside',ho:'Head Outside',fa:'Failed Attacks',tb:'Top / Bottom'};

      var sum=0;

      var cls=avg>=70?'good':avg>=50?'ok':'weak';
      var tag=avg>=70?'Strong':avg>=50?'Developing':'Needs Work';
      h+='<div class="sit-row">';
      h+='<div class="sit-name">'+sits[k]+'</div>';
      h+='<div class="sit-bar"><div class="sit-fill '+cls+'" style="width:'+avg+'%"><span class="sit-pct">'+avg+'%</span></div></div>';
      h+='<div class="sit-tag '+cls+'">'+tag+'</div>';
      h+='</div>';
    }
    h+='<div style="font-size:10px;color:var(--gr);margin-top:8px;text-align:right">Based on '+battleWrestlers.length+' wrestlers</div>';

  // ══════════════════════════════════════
  h+='<div class="sec-label">Athletic Tiers</div>';
  h+='<div class="stat-card">';
  var eliteC=0,superC=0,solidC=0,workC=0;
  r.forEach(function(a){
    if(!a.athletic||!a.athletic.done)return;
    var tier=getAthTier(a.athletic.results);
    if(tier==='elite')eliteC++;
    else if(tier==='super')superC++;
    else if(tier==='solid')solidC++;
    else workC++;
  });
  var athTotal=eliteC+superC+solidC+workC;
  function tierPct(c){return athTotal>0?Math.round(c/athTotal*100):0;}

  h+='<div class="tier-row"><div class="tr-badge elite">ELITE ATHLETE</div><div class="tr-bar"><div class="tr-fill elite" style="width:'+tierPct(eliteC)+'%"></div></div><div class="tr-count">'+eliteC+'</div></div>';

  // ══════════════════════════════════════

  // ══════════════════════════════════════

  h+='<div class="stat-card">';
  var exElite=0,exStrong=0,exStandard=0,exBelow=0;
  r.forEach(function(a){
    if(!a.exercise||!a.exercise.done)return;
    if(!a.exercise.completed){exBelow++;return;}
    // Parse time string like "11:30" to minutes
    var parts=a.exercise.time.split(':');
    var mins=parseInt(parts[0])+(parseInt(parts[1]||0)/60);
    if(mins<10)exElite++;
    else if(mins<12)exStrong++;
    else if(mins<=15)exStandard++;
    else exBelow++;
  });
  var exTotal=exElite+exStrong+exStandard+exBelow;
  // Count not attempted
  var exNotDone=0;r.forEach(function(a){if(!a.exercise||!a.exercise.done)exNotDone++;});
  function exPct(c){return exTotal>0?Math.round(c/exTotal*100):0;}

  h+='<div class="tier-row"><div class="tr-badge elite">ELITE</div><div class="tr-bar"><div class="tr-fill elite" style="width:'+exPct(exElite)+'%"></div></div><div class="tr-count">'+exElite+'</div></div>';
  h+='<div style="font-size:9px;color:var(--gr);padding:0 0 6px 110px;margin-top:-4px">Under 10 minutes</div>';

  h+='<div class="tier-row"><div class="tr-badge super">STRONG</div><div class="tr-bar"><div class="tr-fill super" style="width:'+exPct(exStrong)+'%"></div></div><div class="tr-count">'+exStrong+'</div></div>';
  h+='<div style="font-size:9px;color:var(--gr);padding:0 0 6px 110px;margin-top:-4px">10 – 12 minutes</div>';

  h+='<div class="tier-row"><div class="tr-badge solid">AT STANDARD</div><div class="tr-bar"><div class="tr-fill solid" style="width:'+exPct(exStandard)+'%"></div></div><div class="tr-count">'+exStandard+'</div></div>';
  h+='<div style="font-size:9px;color:var(--gr);padding:0 0 6px 110px;margin-top:-4px">12 – 15 minutes</div>';

  h+='<div class="tier-row"><div class="tr-badge working">BELOW</div><div class="tr-bar"><div class="tr-fill working" style="width:'+exPct(exBelow)+'%"></div></div><div class="tr-count">'+exBelow+'</div></div>';
  h+='<div style="font-size:9px;color:var(--gr);padding:0 0 2px 110px;margin-top:-4px">Did not finish or over 15 min</div>';

  if(exNotDone>0){
    h+='<div style="font-size:10px;color:var(--gr);margin-top:8px;text-align:right">'+exNotDone+' wrestler'+(exNotDone>1?'s':'')+' not yet attempted</div>';
  }
  h+='</div>';

  // ══════════════════════════════════════
  // 8. MOST ACTIVE
  // ══════════════════════════════════════
  h+='<div class="sec-label">Most Active</div>';
  h+='<div class="stat-card">';
  var byActivity=r.slice().sort(function(a,b){
    var aTotal=(a.activity?a.activity.vids:0)+(a.activity?a.activity.extra:0)+(a.activity?a.activity.private:0)+(a.activity?a.activity.content:0);
    var bTotal=(b.activity?b.activity.vids:0)+(b.activity?b.activity.extra:0)+(b.activity?b.activity.private:0)+(b.activity?b.activity.content:0);
    return bTotal-aTotal;
  });
  var topActive=byActivity.slice(0,5);
  topActive.forEach(function(a,i){
    var act=a.activity||{vids:0,vidMin:0,extra:0,private:0,content:0};
    var totalAct=act.vids+act.extra+act.private+act.content;
    var hrs=Math.round(act.vidMin/60*10)/10;
    h+='<div class="perf-row">';
    h+='<div class="perf-rank">'+(i+1)+'</div>';
    h+='<div class="perf-info"><div class="perf-name">'+a.name.toUpperCase()+'</div><div class="perf-detail">'+act.vids+' vids · '+hrs+' hrs · '+act.extra+' extra · '+act.private+' private</div></div>';
    h+='<div class="perf-record"><div class="perf-wl" style="font-size:16px;color:var(--gd)">'+totalAct+'</div></div>';
    h+='</div>';
  });
  h+='</div>';

  // ══════════════════════════════════════
  // 9. TEAM ACTIVITY TOTALS
  // ══════════════════════════════════════
  h+='<div class="sec-label">Team Activity Totals</div>';
  h+='<div class="stat-card">';
  var tVids=0,tMin=0,tExtra=0,tPrivate=0,tContent=0;
  r.forEach(function(a){
    var act=a.activity||{vids:0,vidMin:0,extra:0,private:0,content:0};
    tVids+=act.vids;tMin+=act.vidMin;tExtra+=act.extra;tPrivate+=act.private;tContent+=act.content;
  });
  h+='<div class="act-grid">';
  h+='<div class="act-box"><div class="act-icon">📹</div><div class="act-num">'+tVids+'</div><div class="act-label">Videos Watched</div><div class="act-sub">'+Math.round(tMin/60*10)/10+' total hrs</div></div>';
  h+='<div class="act-box"><div class="act-icon">✅</div><div class="act-num">'+tContent+'</div><div class="act-label">Lessons Done</div><div class="act-sub">'+Math.round(tContent/n*10)/10+' avg per wrestler</div></div>';
  h+='<div class="act-box"><div class="act-icon">🏋️</div><div class="act-num">'+tExtra+'</div><div class="act-label">Extra Practices</div><div class="act-sub">'+Math.round(tExtra/n*10)/10+' avg per wrestler</div></div>';
  h+='<div class="act-box"><div class="act-icon">👤</div><div class="act-num">'+tPrivate+'</div><div class="act-label">Private Lessons</div><div class="act-sub">'+Math.round(tPrivate/n*10)/10+' avg per wrestler</div></div>';
  h+='</div></div>';

  // ══════════════════════════════════════
  // 10. ASSESSMENT COMPLETION (bottom)
  // ══════════════════════════════════════
  h+='<div class="sec-label">Assessment Completion</div>';
  h+='<div class="stat-card">';
  var athDone=0,exDone=0,sklDone=0,btlDone=0;
  r.forEach(function(a){
    if(a.athletic&&a.athletic.done)athDone++;
    if(a.exercise&&a.exercise.done)exDone++;
    if(a.skill&&a.skill.done)sklDone++;
    if(a.battle&&a.battle.done)btlDone++;
  });
  function pctColor(v){return v>=80?'color:var(--gn)':v>=50?'color:var(--gd)':'color:var(--rd)';}
  h+='<div class="assess-grid">';
  h+='<div class="ag-card"><div class="ag-icon">🤸</div><div class="ag-name">Athletic</div><div class="ag-pct" style="'+pctColor(Math.round(athDone/n*100))+'">'+Math.round(athDone/n*100)+'%</div><div class="ag-count">'+athDone+' / '+n+'</div></div>';
  h+='<div class="ag-card"><div class="ag-icon">💪</div><div class="ag-name">Exercise</div><div class="ag-pct" style="'+pctColor(Math.round(exDone/n*100))+'">'+Math.round(exDone/n*100)+'%</div><div class="ag-count">'+exDone+' / '+n+'</div></div>';
  h+='<div class="ag-card"><div class="ag-icon">🎯</div><div class="ag-name">Skill</div><div class="ag-pct" style="'+pctColor(Math.round(sklDone/n*100))+'">'+Math.round(sklDone/n*100)+'%</div><div class="ag-count">'+sklDone+' / '+n+'</div></div>';
  h+='<div class="ag-card"><div class="ag-icon">⚔️</div><div class="ag-name">Battle</div><div class="ag-pct" style="'+pctColor(Math.round(btlDone/n*100))+'">'+Math.round(btlDone/n*100)+'%</div><div class="ag-count">'+btlDone+' / '+n+'</div></div>';
  h+='</div></div>';

  document.getElementById('stats-body').innerHTML=h;
}

// ── INIT ──
buildStats();
</script>
</body>
</html>
