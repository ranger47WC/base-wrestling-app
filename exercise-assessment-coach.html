<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BASE Wrestling — Exercise Assessment (Coach)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bk:#0a0a0a;--dk:#141414;--cd:#1a1a1a;--bd:#2a2a2a;--gr:#888;--grd:#555;--lt:#ddd;--wh:#f0f0f0;--gd:#c8a84e;--gdd:#a08030;--gdg:rgba(200,168,78,.12);--gn:#27ae60;--gng:rgba(39,174,96,.12);--rd:#c8102e;--rdg:rgba(200,16,46,.12);--r:12px;--rl:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--bk);color:var(--wh);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--dk);display:flex;flex-direction:column;position:relative}
.hd{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);flex-shrink:0;z-index:10;background:var(--dk)}
.hd-left{display:flex;align-items:center;gap:12px}
.hd-back{width:36px;height:36px;border-radius:10px;border:1px solid var(--bd);background:var(--cd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--gr)}
.hd-info div:first-child{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gd)}
.hd-info div:last-child{font-size:11px;color:var(--gr);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.hd-save{font-size:12px;color:var(--gd);font-weight:600;cursor:pointer;padding:8px 12px;border:1px solid rgba(200,168,78,.3);border-radius:var(--r);background:var(--gdg)}
.section-intro{padding:24px 20px 16px;text-align:center}
.section-icon{font-size:40px;margin-bottom:12px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gd);margin-bottom:8px}
.section-desc{font-size:13px;color:var(--gr);line-height:1.5;max-width:340px;margin:0 auto}
.q-area{flex:1;overflow-y:auto;padding:0 20px 120px}
.q-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;margin-bottom:12px}
.q-num{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--grd);font-weight:700;margin-bottom:8px}
.q-text{font-size:15px;color:var(--wh);font-weight:600;line-height:1.4;margin-bottom:6px}
.q-hint{font-size:12px;color:var(--gr);line-height:1.4;margin-bottom:16px}
.input-row{display:flex;gap:10px;align-items:center}
.input-row .num-input{flex:1}
.num-input{width:100%;padding:16px;background:var(--bk);border:2px solid var(--bd);border-radius:var(--r);color:var(--wh);font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;text-align:center;outline:none;transition:border-color .2s;-moz-appearance:textfield}
.num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.num-input:focus{border-color:var(--gd)}
.num-input::placeholder{color:var(--grd);font-size:16px;letter-spacing:1px}
.done-btn{padding:16px 20px;background:var(--gdg);border:2px solid var(--gdd);border-radius:var(--r);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gd);cursor:pointer;flex-shrink:0;transition:all .2s}
.done-btn.locked{background:var(--gng);border-color:var(--gn);color:var(--gn)}
.summary-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;margin-bottom:12px}
.summary-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gd);margin-bottom:14px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,42,42,.5)}
.summary-row:last-child{border-bottom:none}
.summary-label{font-size:13px;color:var(--lt);font-weight:500}
.summary-tier{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:3px 8px;border-radius:4px}
.summary-num{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.tier-elite{color:var(--gn);background:var(--gng)}
.tier-standard{color:var(--gd);background:var(--gdg)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:16px 20px;background:linear-gradient(transparent,var(--dk) 20%);display:flex;gap:10px;z-index:20}
.btn-next{flex:1;padding:14px;border-radius:var(--r);border:none;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;text-align:center;transition:all .2s}
.btn-next.ready{background:var(--gd);color:var(--bk)}
.btn-next.disabled{background:var(--bd);color:var(--grd);pointer-events:none}
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;flex:1}
.complete-icon{font-size:60px;margin-bottom:20px}
.complete-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--gd);margin-bottom:12px}
.complete-sub{font-size:14px;color:var(--gr);line-height:1.5;max-width:300px;margin-bottom:32px}
.complete-btn{padding:16px 40px;border-radius:var(--r);border:none;background:var(--gd);color:var(--bk);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer}
.video-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);margin:0 0 16px;overflow:hidden}
.video-thumb{height:160px;background:var(--bk);display:flex;align-items:center;justify-content:center}
.video-play{width:50px;height:50px;border-radius:50%;background:rgba(200,168,78,.9);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--bk)}
.video-label{padding:10px 14px;font-size:12px;color:var(--gr);font-weight:600}
.circuit-detail{background:var(--cd);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 20px;margin-bottom:16px}
.circuit-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--gd);margin-bottom:10px}
.circuit-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(42,42,42,.5);font-size:12px;color:var(--lt)}
.circuit-item:last-child{border-bottom:none}
.circuit-reps{color:var(--gr);font-weight:600}
.roster-note{text-align:center;padding:8px 20px 0;font-size:12px;color:var(--gd);font-weight:600}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
var TEAM_SIZE=20;
var standardVal=undefined;
var eliteVal=undefined;
var done=false;

function commitStandard(){
  var el=document.getElementById('inp-std');
  if(el){var v=parseInt(el.value);standardVal=isNaN(v)||v<0?0:v;render();setTimeout(function(){var next=document.querySelector('[data-unlocked="true"]');if(next)next.focus();},50);}
}
function commitElite(){
  var el=document.getElementById('inp-eli');
  if(el){var v=parseInt(el.value);if(isNaN(v)||v<0)v=0;if(v>standardVal)v=standardVal;eliteVal=v;render();}
}
function unlockStandard(){standardVal=undefined;eliteVal=undefined;render();}
function unlockElite(){eliteVal=undefined;render();}

function allComplete(){return standardVal!==undefined&&eliteVal!==undefined;}

function render(){
  if(done){renderComplete(document.getElementById('app'));return;}
  var app=document.getElementById('app');
  var answered=(standardVal!==undefined?1:0)+(eliteVal!==undefined?1:0);
  var pct=Math.round((answered/2)*100);
  var h='';

  h+='<div class="hd"><div class="hd-left"><div class="hd-back" onclick="goBack()">←</div>';
  h+='<div class="hd-info"><div>EXERCISE ASSESSMENT</div>';
  h+='<div>Team Evaluation</div></div></div>';
  h+='<div class="hd-save" onclick="saveAndExit()">SAVE & EXIT</div></div>';

  h+='<div class="roster-note">Your team: '+TEAM_SIZE+' returning athletes</div>';

  h+='<div class="section-intro"><div class="section-icon">💪</div>';
  h+='<div class="section-title">EXERCISE ASSESSMENT</div>';
  h+='<div class="section-desc">Rate your team\'s ability to complete the Gold Standard Circuit.</div></div>';

  h+='<div class="q-area">';

  h+='<div class="video-card"><div class="video-thumb"><div class="video-play">▶</div></div>';
  h+='<div class="video-label">VIDEO: Why Strength Matters</div></div>';

  h+='<div class="circuit-detail">';
  h+='<div class="circuit-title">GOLD STANDARD CIRCUIT</div>';
  h+='<div class="circuit-item"><span>Bridge Kicks</span><span class="circuit-reps">10 reps</span></div>';
  h+='<div class="circuit-item"><span>Bridge Circles Right</span><span class="circuit-reps">5 reps</span></div>';
  h+='<div class="circuit-item"><span>Bridge Circles Left</span><span class="circuit-reps">5 reps</span></div>';
  h+='<div style="font-size:10px;color:var(--gd);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin:10px 0 6px">Lifting Circuit — 3 Sets</div>';
  h+='<div class="circuit-item"><span>Push-ups</span><span class="circuit-reps">25 reps</span></div>';
  h+='<div class="circuit-item"><span>Pull-ups</span><span class="circuit-reps">10 reps</span></div>';
  h+='<div class="circuit-item"><span>Partner Good Mornings</span><span class="circuit-reps">10 reps</span></div>';
  h+='<div class="circuit-item"><span>Hanging V-ups</span><span class="circuit-reps">10 reps</span></div>';
  h+='<div class="circuit-item"><span>Partner Squats</span><span class="circuit-reps">10 reps</span></div>';
  h+='</div>';

  // Q1
  h+='<div class="q-card">';
  h+='<div class="q-num">Q1</div>';
  h+='<div class="q-text">How many athletes can finish under 15 minutes?</div>';
  h+='<div class="q-hint">Out of your '+TEAM_SIZE+' returning athletes, how many do you think can complete the entire Gold Standard Circuit in under 15 minutes?</div>';
  h+='<div class="input-row">';
  if(standardVal===undefined){
    h+='<input class="num-input" id="inp-std" data-unlocked="true" type="number" min="0" placeholder="Out of '+TEAM_SIZE+'" inputmode="numeric" onkeydown="if(event.key===\'Enter\'){commitStandard();}">';
    h+='<div class="done-btn" onclick="commitStandard()">DONE</div>';
  } else {
    h+='<input class="num-input" id="inp-std" type="number" min="0" value="'+standardVal+'" inputmode="numeric" style="border-color:var(--gn)" readonly onclick="unlockStandard()">';
    h+='<div class="done-btn locked" onclick="unlockStandard()">✓ '+standardVal+'</div>';
  }
  h+='</div></div>';

  // Q2 — only show after Q1 committed and > 0
  if(standardVal!==undefined&&standardVal>0){
    h+='<div class="q-card">';
    h+='<div class="q-num">Q2</div>';
    h+='<div class="q-text">Out of those '+standardVal+', how many can finish under 10 minutes?</div>';
    h+='<div class="q-hint">These are your elite athletes — the ones who can crush the circuit in under 10 minutes.</div>';
    h+='<div class="input-row">';
    if(eliteVal===undefined){
      h+='<input class="num-input" id="inp-eli" data-unlocked="true" type="number" min="0" max="'+standardVal+'" placeholder="Out of '+standardVal+'" inputmode="numeric" onkeydown="if(event.key===\'Enter\'){commitElite();}">';
      h+='<div class="done-btn" onclick="commitElite()">DONE</div>';
    } else {
      h+='<input class="num-input" id="inp-eli" type="number" min="0" max="'+standardVal+'" value="'+eliteVal+'" inputmode="numeric" style="border-color:var(--gn)" readonly onclick="unlockElite()">';
      h+='<div class="done-btn locked" onclick="unlockElite()">✓ '+eliteVal+'</div>';
    }
    h+='</div></div>';
  }

  // Handle Q1 = 0
  if(standardVal===0){
    eliteVal=0;
  }

  // Summary
  if(allComplete()){
    var stdOnly=standardVal-eliteVal;
    h+='<div class="summary-card">';
    h+='<div class="summary-title">YOUR ESTIMATE</div>';
    h+='<div class="summary-row"><div><span class="summary-label">Elite</span> <span class="summary-tier tier-elite">Under 10 min</span></div><div class="summary-num" style="color:var(--gn)">'+eliteVal+'</div></div>';
    h+='<div class="summary-row"><div><span class="summary-label">Standard</span> <span class="summary-tier tier-standard">10–15 min</span></div><div class="summary-num" style="color:var(--gd)">'+stdOnly+'</div></div>';
    h+='</div>';
  }

  h+='</div>';

  var complete=allComplete();
  h+='<div class="bottom-nav">';
  h+='<div class="btn-next '+(complete?'ready':'disabled')+'" onclick="'+(complete?'finishAssessment()':'')+'">FINISH</div>';
  h+='</div>';

  app.innerHTML=h;
}

function renderComplete(app){
  var stdOnly=standardVal-eliteVal;
  var h='';
  h+='<div class="hd"><div class="hd-left"><div class="hd-info"><div>EXERCISE ASSESSMENT</div>';
  h+='<div>Complete</div></div></div></div>';
  h+='<div class="complete-screen">';
  h+='<div class="complete-icon">💪</div>';
  h+='<div class="complete-title">EXERCISE ASSESSMENT COMPLETE</div>';
  h+='<div class="complete-sub">Your team evaluation has been saved.<br><br>';
  h+='<strong style="color:var(--gn)">'+eliteVal+'</strong> Elite · ';
  h+='<strong style="color:var(--gd)">'+stdOnly+'</strong> Standard</div>';
  h+='<div class="complete-btn" onclick="alert(\'Redirecting to results...\')">VIEW RESULTS</div>';
  h+='</div>';
  app.innerHTML=h;
}

function goBack(){if(confirm('Save progress and exit?'))saveAndExit();}
function saveAndExit(){alert('Progress saved.\nYou can pick up where you left off.');}
function finishAssessment(){done=true;render();}

render();
</script>
</body>
</html>
