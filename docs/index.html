<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BASE Wrestling</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bk:#0a0a0a;--dk:#141414;--cd:#1a1a1a;--bd:#2a2a2a;--gr:#555;--lt:#ccc;--wh:#f0f0f0;--gd:#c8a84e;--gdd:#a08030;--gdg:rgba(200,168,78,.12);--gn:#27ae60;--rd:#c8102e;--r:12px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bk);color:var(--wh);height:100vh;height:100dvh;overflow:hidden}
.app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;background:var(--dk);position:relative;overflow:hidden}
#login{position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;background:var(--dk);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 30px;text-align:center;transition:opacity .4s}
#login.hidden{opacity:0;pointer-events:none}
.logo{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:5px;color:var(--wh);background:var(--rd);padding:6px 18px;border-radius:4px;display:inline-block;margin-bottom:24px}
.title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;color:var(--gd);line-height:1;margin-bottom:6px}
.sub{font-size:12px;color:var(--gr);letter-spacing:2px;text-transform:uppercase;margin-bottom:40px}
.lbtn{width:100%;padding:16px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;border:none;border-radius:var(--r);cursor:pointer;margin-bottom:10px;transition:all .2s}
.lbtn.main{background:linear-gradient(135deg,var(--gd),var(--gdd));color:var(--bk)}
.lbtn.main:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,168,78,.3)}
.lbtn.dis{background:var(--cd);color:var(--gr);border:1px solid var(--bd)}
.soon{font-size:9px;color:#3a3a3a;letter-spacing:2px;text-transform:uppercase;margin-top:2px;margin-bottom:12px}
#viewer{position:absolute;top:0;left:0;width:100%;height:calc(100% - 68px);z-index:50}
#viewer iframe{width:100%;height:100%;border:none}
#nav{position:absolute;bottom:0;left:0;width:100%;z-index:200;background:var(--cd);border-top:1px solid var(--bd);display:none;padding:4px 4px 20px;gap:0;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
#nav.show{display:flex}
.nb{display:inline-flex;flex-direction:column;align-items:center;padding:5px 7px;border-radius:8px;cursor:pointer;transition:all .15s;flex-shrink:0;min-width:52px}
.nb:hover{background:var(--gdg)}
.nb.active{background:var(--gdg)}
.nb .ni{font-size:16px;margin-bottom:1px}
.nb .nl{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:1px;color:var(--gr);transition:color .15s}
.nb.active .nl{color:var(--gd)}
</style>
</head>
<body>
<div class="app">
  <div id="login">
    <div style="width:100%">
      <div class="logo">BASE WRESTLING</div>
      <div class="title">BASE</div>
      <div class="sub">Battle · Athletic · Skill · Exercise</div>
      <button class="lbtn main" onclick="startApp()">COACH LOGIN</button>
      <button class="lbtn dis">ATHLETE LOGIN</button>
      <div class="soon">COMING SOON</div>
      <button class="lbtn dis">PARENT LOGIN</button>
      <div class="soon">COMING SOON</div>
    </div>
  </div>
  <div id="viewer"><iframe id="frame" src="about:blank"></iframe></div>
  <div id="nav">
    <div class="nb active" onclick="load('coach-onboarding-v4.html',this)"><div class="ni">🏆</div><div class="nl">ONBOARD</div></div>
    <div class="nb" onclick="load('coach-dashboard-v3.html',this)"><div class="ni">🏠</div><div class="nl">HOME</div></div>
    <div class="nb" onclick="load('coach-roster-v2.html',this)"><div class="ni">👥</div><div class="nl">ROSTER</div></div>
    <div class="nb" onclick="load('team-stats-v2.html',this)"><div class="ni">📊</div><div class="nl">STATS</div></div>
    <div class="nb" onclick="load('weekly-schedule-v4.html',this)"><div class="ni">📅</div><div class="nl">SCHEDULE</div></div>
    <div class="nb" onclick="load('practice-plan-battle-v5.html',this)"><div class="ni">⚔️</div><div class="nl">BATTLE</div></div>
    <div class="nb" onclick="load('practice-plan-technique-v3.html',this)"><div class="ni">🎯</div><div class="nl">TECH</div></div>
    <div class="nb" onclick="load('practice-plan-drill.html',this)"><div class="ni">🔄</div><div class="nl">DRILL</div></div>
    <div class="nb" onclick="load('practice-plan-circuit.html',this)"><div class="ni">💪</div><div class="nl">CIRCUIT</div></div>
  </div>
</div>
<script>
function startApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('nav').classList.add('show');
  document.getElementById('frame').src='coach-onboarding-v4.html';
}
function load(file,el){
  document.getElementById('frame').src=file;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
}
</script>
</body>
</html>
