<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BASE Wrestling</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bk:#0a0a0a;--dk:#141414;--cd:#1a1a1a;--bd:#2a2a2a;--gd:#c8a84e;--gdd:#a08030;--gdg:rgba(200,168,78,.12);--gn:#27ae60;--rd:#c8102e;--wh:#f0f0f0;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--bk);color:var(--wh);min-height:100vh;overflow:hidden}
.view{display:none;width:100%;height:100vh}
.view.on{display:flex;flex-direction:column}
iframe{width:100%;height:100vh;border:none}

/* LOGIN */
.login{align-items:center;justify-content:center;padding:40px 24px;text-align:center;max-width:430px;margin:0 auto;min-height:100vh;background:var(--bk)}
.l-badge{display:inline-block;background:var(--rd);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:5px;padding:8px 20px;border-radius:6px;margin-bottom:8px}
.l-sub{font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:32px}
.l-form{width:100%;max-width:320px}
.l-input{width:100%;padding:14px 16px;background:var(--cd);border:2px solid var(--bd);border-radius:var(--r);color:var(--wh);font-family:'Barlow',sans-serif;font-size:15px;outline:none;margin-bottom:12px}
.l-input:focus{border-color:var(--gd)}
.l-input::placeholder{color:#666}
.l-roles{display:flex;gap:8px;margin-bottom:20px}
.l-role{flex:1;padding:14px 8px;background:var(--cd);border:2px solid var(--bd);border-radius:var(--r);text-align:center;cursor:pointer;transition:all .2s}
.l-role:hover{border-color:var(--gdd)}
.l-role.on{border-color:var(--gd);background:var(--gdg)}
.l-role.off{opacity:.35;pointer-events:none}
.l-role .ri{font-size:24px;display:block;margin-bottom:4px}
.l-role .rn{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--wh)}
.l-role.on .rn{color:var(--gd)}
.l-role .rs{font-size:8px;letter-spacing:1px;color:var(--gdd);margin-top:2px}
.l-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--gd),var(--gdd));color:var(--bk);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;border:none;border-radius:var(--r);cursor:pointer;transition:all .3s;margin-top:8px}
.l-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,168,78,.3)}
.l-toggle{margin-top:16px;font-size:12px;color:#aaa}
.l-toggle a{color:var(--gd);cursor:pointer;text-decoration:none}
</style>
</head>
<body>

<!-- VIEW 1: LOGIN -->
<div class="view on" id="v-login">
  <div class="login">
    <div class="l-badge">BASE WRESTLING</div>
    <div class="l-sub">Built for Coaches. Built for Athletes.</div>
    <div class="l-form">
      <input class="l-input" type="email" placeholder="Email" id="loginEmail">
      <input class="l-input" type="password" placeholder="Password" id="loginPass">
      <div class="l-roles">
        <div class="l-role on" id="roleCoach" onclick="pickRole('coach')"><span class="ri">🏆</span><span class="rn">COACH</span></div>
        <div class="l-role off" id="roleAthlete"><span class="ri">🤼</span><span class="rn">ATHLETE</span><span class="rs">COMING SOON</span></div>
        <div class="l-role off" id="roleParent"><span class="ri">👪</span><span class="rn">PARENT</span><span class="rs">COMING SOON</span></div>
      </div>
      <button class="l-btn" onclick="doLogin()">SIGN IN</button>
      <div class="l-toggle">Don't have an account? <a onclick="doLogin()">Create Account</a></div>
    </div>
  </div>
</div>

<!-- VIEW 2: ONBOARDING (loads approved file) -->
<div class="view" id="v-onboard">
  <iframe id="frame-onboard" src=""></iframe>
</div>

<!-- VIEW 3: DASHBOARD (loads approved file) -->
<div class="view" id="v-dash">
  <iframe id="frame-dash" src=""></iframe>
</div>

<script>
function showView(id){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on')});
  document.getElementById('v-'+id).classList.add('on');
}

function pickRole(r){
  // Only coach works right now
}

function doLogin(){
  // Load the onboarding screen
  document.getElementById('frame-onboard').src='coach-onboarding.html';
  showView('onboard');
}

// Listen for messages from iframes to navigate between screens
window.addEventListener('message',function(e){
  if(e.data==='go-dashboard'){
    document.getElementById('frame-dash').src='coach-dashboard.html';
    showView('dash');
  }
});
</script>
</body>
</html>
